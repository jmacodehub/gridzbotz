# =============================================================================
# CI — gridzbotz
#
# Runs on every push to main and every pull request targeting main.
# Three jobs in sequence: check → test → clippy.
#
# Cache: Swatinem/rust-cache caches ~/.cargo/registry + target/ between runs.
# Toolchain: dtolnay/rust-toolchain@stable pins to current stable Rust.
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # 1. COMPILE CHECK — fast feedback, no binary produced
  # ---------------------------------------------------------------------------
  check:
    name: 🔧 cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check (all targets)
        run: cargo check --all-targets

  # ---------------------------------------------------------------------------
  # 2. TEST SUITE — all unit + integration tests
  # ---------------------------------------------------------------------------
  test:
    name: 🧪 cargo test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test (all)
        run: cargo test --all

  # ---------------------------------------------------------------------------
  # 3. CLIPPY LINTS — -D warnings means CI fails on any lint
  # ---------------------------------------------------------------------------
  clippy:
    name: 📎 cargo clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy (all targets, deny warnings)
        run: cargo clippy --all-targets -- -D warnings
