# =============================================================================
# CI — gridzbotz
#
# Runs on every push to main and every pull request targeting main.
# Three jobs in sequence: check → test → clippy.
#
# Clippy strategy (two-tier):
#   Tier 1 — STRICT  : --bin grid_bot  → -D warnings (zero tolerance on new code)
#   Tier 2 — REPORT  : --lib --tests   → warnings only (30 pre-existing lints
#                        tracked as debt, being resolved in PR #66
#                        fix/clippy-lint-cleanup)
#
# Once PR #66 merges, Tier 2 will be promoted to -D warnings too.
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # 1. COMPILE CHECK — fast feedback, no binary produced
  # ---------------------------------------------------------------------------
  check:
    name: 🔧 cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check (all targets)
        run: cargo check --all-targets

  # ---------------------------------------------------------------------------
  # 2. TEST SUITE — all unit + integration tests
  # ---------------------------------------------------------------------------
  test:
    name: 🧪 cargo test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test (all)
        run: cargo test --all

  # ---------------------------------------------------------------------------
  # 3. CLIPPY LINTS
  #
  # Tier 1 (STRICT): grid_bot binary — -D warnings, zero tolerance.
  #   All new code we ship must be lint-free.
  #
  # Tier 2 (REPORT): library + tests — warnings only, non-blocking.
  #   30 pre-existing lints accumulated before CI existed. Tracked debt.
  #   Being resolved in PR #66 (fix/clippy-lint-cleanup).
  #   This step will be promoted to -D warnings once PR #66 merges.
  # ---------------------------------------------------------------------------
  clippy:
    name: 📎 cargo clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: "🟥 Tier 1 — grid_bot binary (strict: -D warnings)"
        run: cargo clippy --bin grid_bot -- -D warnings

      - name: "🟡 Tier 2 — library + tests (report only — debt tracked in PR #66)"
        run: cargo clippy --lib --tests 2>&1 || true
        # Note: 30 pre-existing lints in lib code (dead_code, field_reassign_with_default,
        # redundant_closure, needless_return, clone_on_copy, manual_range_contains, etc.)
        # Full list + fixes: https://github.com/jmacodehub/gridzbotz/pull/66
