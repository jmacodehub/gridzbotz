# ═══════════════════════════════════════════════════════════════════════════
# LIVE TEST CONFIG — Safe Testing with Minimal Capital
# ═══════════════════════════════════════════════════════════════════════════
# 
# Purpose: Template for live Jupiter swap testing with minimal risk
# Capital: $10 USDC + 0.05 SOL (~$14 total at SOL=$80)
# Grid:    Wide spacing (0.5%) → fewer trades
# 
# Usage:
#   cargo run --release -- --config config/live_test.toml --duration-minutes 15
# 
# Safety: Always test on devnet first before mainnet!
# ═══════════════════════════════════════════════════════════════════════════

test_name = "Live Test V5.3 - Minimal Capital Safety Test"

# ═══════════════════════════════════════════════════════════════════════════
#  🤖 BOT CORE
# ═══════════════════════════════════════════════════════════════════════════
[bot]
name = "GridzBot-LiveTest"
version = "5.3.0"
environment = "testing"

# 🔴 LIVE MODE — Real Jupiter swaps with minimal capital
execution_mode = "live"
instance_id = "live-test-1"

# ═══════════════════════════════════════════════════════════════════════════
#  🌐 NETWORK — Start with devnet!
# ═══════════════════════════════════════════════════════════════════════════
[network]
cluster = "devnet"
rpc_url = "https://api.devnet.solana.com"
commitment = "confirmed"

# ═══════════════════════════════════════════════════════════════════════════
#  ⚡ EXECUTION — Live trading knobs
# ═══════════════════════════════════════════════════════════════════════════
[execution]
max_trade_sol = 0.1                  # Max 0.1 SOL per trade (safety)
priority_fee_microlamports = 50000
max_slippage_bps = 100               # 1% slippage (2x normal for safety)
confirmation_timeout_secs = 60
max_retries = 3

# ═══════════════════════════════════════════════════════════════════════════
#  💰 PAPER TRADING (Capital Settings)
# ═══════════════════════════════════════════════════════════════════════════
[paper_trading]
# Minimal capital for live testing (min $10 enforced by main.rs)
initial_usdc = 10.0                  # Just above minimum threshold
initial_sol = 0.05                   # ~$4 at SOL=$80

# Default to 5-minute test
test_duration_minutes = 5

# ═══════════════════════════════════════════════════════════════════════════
#  📊 TRADING — Wide grid for fewer fills
# ═══════════════════════════════════════════════════════════════════════════
[trading]
grid_levels = 10
grid_spacing_percent = 0.5           # 0.5% wide spacing → fewer triggers
min_order_size = 0.01                # Small orders for testing
max_position_size = 1.0

min_usdc_reserve = 5.0               # Keep $5 reserve
min_sol_reserve = 0.01               # Keep 0.01 SOL reserve

enable_dynamic_grid = false          # Static grid for testing
volatility_window = 100
reposition_threshold = 1.0           # 1% drift before reposition (wide)

enable_auto_rebalance = false        # Manual control for testing
enable_smart_rebalance = false
rebalance_threshold_pct = 10.0
rebalance_cooldown_secs = 300

max_orders_per_side = 5              # Limit open orders
order_refresh_interval_secs = 600
enable_market_orders = false
enable_fee_optimization = true

enable_order_lifecycle = true
order_max_age_minutes = 10
order_refresh_interval_minutes = 5
min_orders_to_maintain = 3

min_profit_threshold_pct = 0.1
max_slippage_pct = 1.5               # Accept up to 1.5% slippage

enable_price_bounds = false
lower_price_bound = 50.0
upper_price_bound = 200.0

# Regime gate OFF for testing (trade regardless of volatility)
enable_regime_gate = false
min_volatility_to_trade = 0.0
pause_in_very_low_vol = false

enable_adaptive_spacing = false
enable_smart_position_sizing = false

# ═══════════════════════════════════════════════════════════════════════════
#  🎯 STRATEGIES — Grid only for simplicity
# ═══════════════════════════════════════════════════════════════════════════
[strategies]
active = ["grid"]
consensus_mode = "single"
enable_multi_timeframe = false
require_timeframe_alignment = false

[strategies.grid]
enabled = true
weight = 1.0
min_confidence = 0.5
reposition_threshold_pct = 1.0       # Wide threshold for testing

[strategies.momentum]
enabled = false
weight = 0.8
min_confidence = 0.6
lookback_period = 20
threshold = 0.02

[strategies.mean_reversion]
enabled = false
weight = 0.7
min_confidence = 0.6
sma_period = 20
std_dev_multiplier = 2.0
strong_buy_threshold = 5.0
buy_threshold = 2.5
strong_sell_threshold = 5.0
sell_threshold = 2.5

[strategies.rsi]
enabled = false
weight = 0.9
min_confidence = 0.7
period = 14
oversold_threshold = 30.0
overbought_threshold = 70.0
extreme_oversold = 20.0
extreme_overbought = 80.0

[strategies.momentum_macd]
enabled = false
weight = 0.8
min_confidence = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods = 26

# ═══════════════════════════════════════════════════════════════════════════
#  🚨 RISK MANAGEMENT — Conservative limits for testing
# ═══════════════════════════════════════════════════════════════════════════
[risk]
max_position_size_pct = 20.0         # Max 20% of capital per position
max_drawdown_pct = 10.0              # Trip breaker at 10% loss
stop_loss_pct = 5.0
take_profit_pct = 10.0
enable_circuit_breaker = true
circuit_breaker_threshold_pct = 8.0
circuit_breaker_cooldown_secs = 300

# ═══════════════════════════════════════════════════════════════════════════
#  📡 PYTH PRICE FEED
# ═══════════════════════════════════════════════════════════════════════════
[pyth]
http_endpoint = "https://hermes.pyth.network"
feed_ids = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500

# ═══════════════════════════════════════════════════════════════════════════
#  ⚙️  PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════
[performance]
cycle_interval_ms = 100              # 10Hz refresh
startup_delay_ms = 3000              # 3s warm-up
request_timeout_ms = 5000

# ═══════════════════════════════════════════════════════════════════════════
#  📋 LOGGING
# ═══════════════════════════════════════════════════════════════════════════
[logging]
level = "info"
file_path = "logs/live_test.log"
enable_file_logging = true

# ═══════════════════════════════════════════════════════════════════════════
#  📈 METRICS
# ═══════════════════════════════════════════════════════════════════════════
[metrics]
enable_metrics = true
stats_interval = 100                 # Stats every 100 cycles

# ═══════════════════════════════════════════════════════════════════════════
#  🗄️  DATABASE
# ═══════════════════════════════════════════════════════════════════════════
[database]
enabled = false

# ═══════════════════════════════════════════════════════════════════════════
#  🔔 ALERTS
# ═══════════════════════════════════════════════════════════════════════════
[alerts]
enabled = false
