# ═══════════════════════════════════════════════════════════════════════════
# ⚡ AGGRESSIVE V3.5 - HIGH-FREQUENCY CONFIGURATION
# Upgraded from v0.2.0 → v3.5
# 
# Strategy: Tight grid, maximum fills, high risk/reward
# Best for: Volatile markets with frequent price action
# Risk Level: ⚡⚡⚡⚡ HIGH
# ═══════════════════════════════════════════════════════════════════════════

test_name = "Overnight Aggressive v3.5"

# ═══════════════════════════════════════════════════════════════════════════
# BOT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[bot]
name = "Aggressive-Bot-v3.5"
version = "3.5.0"
environment = "development"          # 🔥 V3.5: Explicit environment

# ═══════════════════════════════════════════════════════════════════════════
# NETWORK CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[network]
cluster = "devnet"
rpc_url = "https://api.devnet.solana.com"
commitment = "confirmed"
# Note: ws_url removed - handled internally by PriceFeed

# ═══════════════════════════════════════════════════════════════════════════
# PAPER TRADING CONFIGURATION - V3.5 Format
# ═══════════════════════════════════════════════════════════════════════════

[paper_trading]
initial_usdc = 5000.0
initial_sol = 10.0
test_duration_hours = 8             # 🔥 V3.5: Overnight test duration

# ═══════════════════════════════════════════════════════════════════════════
# TRADING CONFIGURATION - V3.5 ENHANCED! 🔥
# ═══════════════════════════════════════════════════════════════════════════

[trading]

# ─────────────────────────────────────────────────────────────────────────
# Core Grid Settings (Aggressive)
# ─────────────────────────────────────────────────────────────────────────
grid_levels = 50                    # 🔥 Increased from 40 for more fills
grid_spacing_percent = 0.10         # 🔥 Tighter! 0.1% for high frequency
min_order_size = 0.1                # Standard size
max_position_size = 100.0           # Higher limit for aggressive

# ─────────────────────────────────────────────────────────────────────────
# Reserves (Keep your values)
# ─────────────────────────────────────────────────────────────────────────
min_usdc_reserve = 300.0            # Increased for safety
min_sol_reserve = 2.0               # Increased for safety

# ─────────────────────────────────────────────────────────────────────────
# Dynamic Grid (Enabled for aggressive trading)
# ─────────────────────────────────────────────────────────────────────────
enable_dynamic_grid = true          # 🔥 V3.5: Enable for better performance
reposition_threshold = 0.4          # 🔥 Lower = more frequent repositioning
volatility_window = 100             # Standard window

# ─────────────────────────────────────────────────────────────────────────
# Auto-Rebalancing
# ─────────────────────────────────────────────────────────────────────────
enable_auto_rebalance = true
enable_smart_rebalance = true       # 🔥 V3.5: ML-enhanced rebalancing
rebalance_threshold_pct = 5.0
rebalance_cooldown_secs = 60        # Quick cooldown for aggressive

# ─────────────────────────────────────────────────────────────────────────
# Order Management
# ─────────────────────────────────────────────────────────────────────────
max_orders_per_side = 25            # Many orders for tight grid
order_refresh_interval_secs = 300
enable_market_orders = false        # Keep limit orders only
enable_fee_optimization = true

# ─────────────────────────────────────────────────────────────────────────
# Risk Limits
# ─────────────────────────────────────────────────────────────────────────
min_profit_threshold_pct = 0.08     # Lower threshold for aggressive
max_slippage_pct = 1.0

# ─────────────────────────────────────────────────────────────────────────
# Price Bounds (Optional)
# ─────────────────────────────────────────────────────────────────────────
enable_price_bounds = false

# ─────────────────────────────────────────────────────────────────────────
# 🔥 V3.9: MARKET REGIME GATE
# ⚠️  UNIT SYSTEM (V3.9+): volatility() returns TRUE PERCENTAGE.
#   Real SOL markets: ~0.001% – 0.010% per 100-cycle window.
#   Safe production floor: 0.02% (filters only true dead-flat markets).
#   Aggressive: use 0.02% — trade in all but completely dead markets.
#   DO NOT use raw-ratio values (e.g. 0.0002) — they belong to the old world.
# ─────────────────────────────────────────────────────────────────────────
enable_regime_gate = true
min_volatility_to_trade = 0.02      # 🔥 0.02% true — aggressive floor, won't block normal SOL
pause_in_very_low_vol = false       # Trade even in very low vol

# ─────────────────────────────────────────────────────────────────────────
# 🔥 V3.5+: ORDER LIFECYCLE MANAGEMENT (CRITICAL NEW FEATURE!)
# ─────────────────────────────────────────────────────────────────────────
enable_order_lifecycle = true
order_max_age_minutes = 8           # 🔥 Short age for aggressive refresh
order_refresh_interval_minutes = 4  # 🔥 Frequent checks
min_orders_to_maintain = 12         # 🔥 High minimum for tight grid

# ─────────────────────────────────────────────────────────────────────────
# V3.5+: Advanced Features (Keep disabled for now)
# ─────────────────────────────────────────────────────────────────────────
enable_adaptive_spacing = false     # Future: ML-based spacing
enable_smart_position_sizing = false # Future: Confidence-based sizing

# ═══════════════════════════════════════════════════════════════════════════
# STRATEGIES CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[strategies]
active = ["grid"]
consensus_mode = "single"
enable_multi_timeframe = false
require_timeframe_alignment = false

[strategies.grid]
enabled = true
weight = 1.0
min_confidence = 0.4                # Lower for aggressive

[strategies.momentum]
enabled = false
weight = 1.0
min_confidence = 0.5
lookback_period = 15
threshold = 0.015

[strategies.mean_reversion]
enabled = false
weight = 0.8
min_confidence = 0.5
sma_period = 15
std_dev_multiplier = 1.5

[strategies.rsi]
enabled = false
weight = 1.0
min_confidence = 0.6
period = 10
oversold_threshold = 25.0
overbought_threshold = 75.0

# ═══════════════════════════════════════════════════════════════════════════
# RISK MANAGEMENT - V3.5 Format
# ═══════════════════════════════════════════════════════════════════════════

[risk]
max_position_size_pct = 40.0        # 🔥 Aggressive 40%
max_drawdown_pct = 12.0             # Higher tolerance
stop_loss_pct = 8.0
take_profit_pct = 15.0
enable_circuit_breaker = true
circuit_breaker_threshold_pct = 10.0
circuit_breaker_cooldown_secs = 300

# ═══════════════════════════════════════════════════════════════════════════
# PYTH PRICE FEED - V3.5 Required Section
# ═══════════════════════════════════════════════════════════════════════════

[pyth]
http_endpoint = "https://hermes.pyth.network"
feed_ids = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500            # Fast updates for aggressive

# ═══════════════════════════════════════════════════════════════════════════
# PERFORMANCE TUNING
# ═══════════════════════════════════════════════════════════════════════════

[performance]
cycle_interval_ms = 100             # 🔥 10Hz for aggressive
startup_delay_ms = 1000

# ═══════════════════════════════════════════════════════════════════════════
# LOGGING CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[logging]
level = "info"
file_path = "logs/overnight_aggressive.log"
enable_file_logging = true

# ═══════════════════════════════════════════════════════════════════════════
# METRICS & MONITORING
# ═══════════════════════════════════════════════════════════════════════════

[metrics]
enable_metrics = true
stats_interval = 50                 # Report every 50 cycles

# ═══════════════════════════════════════════════════════════════════════════
# DATABASE & ALERTS (Optional - Disabled for now)
# ═══════════════════════════════════════════════════════════════════════════

[database]
enabled = false

[alerts]
enabled = false
