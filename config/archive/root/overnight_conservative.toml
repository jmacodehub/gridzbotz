# ═══════════════════════════════════════════════════════════════════════════
# 🛡️ CONSERVATIVE V3.5 - SAFE STEADY CONFIGURATION
# Upgraded from early version → v3.5
# 
# Strategy: Wide spacing, low risk, high win rate focus
# Best for: Stable markets, risk-averse trading, consistent gains
# Risk Level: 🛡️ LOW
# ═══════════════════════════════════════════════════════════════════════════

test_name = "Overnight Conservative v3.5"

# ═══════════════════════════════════════════════════════════════════════════
# BOT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[bot]
name = "Conservative-Bot-v3.5"
version = "3.5.0"
environment = "development"          # 🔥 V3.5: Production-grade conservative

# ═══════════════════════════════════════════════════════════════════════════
# NETWORK CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[network]
cluster = "devnet"
rpc_url = "https://api.devnet.solana.com"
commitment = "confirmed"

# ═══════════════════════════════════════════════════════════════════════════
# PAPER TRADING CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[paper_trading]
initial_usdc = 5000.0               # Your original value
initial_sol = 10.0                  # Your original value
test_duration_hours = 8             # Your original value

# ═══════════════════════════════════════════════════════════════════════════
# TRADING CONFIGURATION - V3.5 ENHANCED! 🔥
# ═══════════════════════════════════════════════════════════════════════════

[trading]

# ─────────────────────────────────────────────────────────────────────────
# Core Grid Settings (Conservative)
# ─────────────────────────────────────────────────────────────────────────
grid_levels = 20                    # 🛡️ Fewer levels (10 buy + 10 sell)
grid_spacing_percent = 0.30         # 🛡️ Wide spacing: 0.3% (your 0.003 * 100)
min_order_size = 0.1                # Standard minimum
max_position_size = 100.0           # High limit but won't hit with conservative

# ─────────────────────────────────────────────────────────────────────────
# Reserves (Your original values - kept safe!)
# ─────────────────────────────────────────────────────────────────────────
min_usdc_reserve = 300.0            # 🛡️ Your safe reserve
min_sol_reserve = 2.0               # 🛡️ Your safe reserve

# ─────────────────────────────────────────────────────────────────────────
# Dynamic Grid (Enabled for better performance)
# ─────────────────────────────────────────────────────────────────────────
enable_dynamic_grid = true          # 🔥 V3.5: Enable for adaptability
reposition_threshold = 1.0          # 🛡️ Higher = less frequent (conservative)
volatility_window = 100             # Standard volatility calculation window

# ─────────────────────────────────────────────────────────────────────────
# Auto-Rebalancing (Your original setting)
# ─────────────────────────────────────────────────────────────────────────
enable_auto_rebalance = true        # Your original value
enable_smart_rebalance = true       # 🔥 V3.5: ML-enhanced rebalancing
rebalance_threshold_pct = 5.0
rebalance_cooldown_secs = 60

# ─────────────────────────────────────────────────────────────────────────
# Order Management
# ─────────────────────────────────────────────────────────────────────────
max_orders_per_side = 10            # Your original: 10 buy + 10 sell
order_refresh_interval_secs = 600   # Conservative refresh
enable_market_orders = false        # Keep limit orders only
enable_fee_optimization = true

# ─────────────────────────────────────────────────────────────────────────
# Risk Limits
# ─────────────────────────────────────────────────────────────────────────
min_profit_threshold_pct = 0.1      # Conservative minimum profit
max_slippage_pct = 1.0

# ─────────────────────────────────────────────────────────────────────────
# Price Bounds (Optional safety feature)
# ─────────────────────────────────────────────────────────────────────────
enable_price_bounds = false

# ─────────────────────────────────────────────────────────────────────────
# 🛡️ V3.9: MARKET REGIME GATE
# ⚠️  UNIT SYSTEM (V3.9+): volatility() returns TRUE PERCENTAGE.
#   Real SOL markets: ~0.001% – 0.010% per 100-cycle window.
#   Safe production floor: 0.02% (filters only true dead-flat markets).
#   Conservative: use 0.02% — pause only in completely dead markets.
#   DO NOT use raw-ratio values (e.g. 0.0002) — they belong to the old world.
# ─────────────────────────────────────────────────────────────────────────
enable_regime_gate = true           # 🛡️ ENABLED for safety
min_volatility_to_trade = 0.02      # 🛡️ 0.02% true — safe conservative floor
pause_in_very_low_vol = false       # 🔥 Allow continuous monitoring

# ─────────────────────────────────────────────────────────────────────────
# 🔥 V3.5+: ORDER LIFECYCLE MANAGEMENT (CRITICAL NEW FEATURE!)
# Conservative: Longer intervals, fewer changes
# ─────────────────────────────────────────────────────────────────────────
enable_order_lifecycle = true
order_max_age_minutes = 15          # 🛡️ Longer age - more stable
order_refresh_interval_minutes = 8  # 🛡️ Less frequent refresh
min_orders_to_maintain = 6          # 🛡️ Minimum grid presence

# ─────────────────────────────────────────────────────────────────────────
# V3.5+: Advanced Features (Keep disabled for conservative)
# ─────────────────────────────────────────────────────────────────────────
enable_adaptive_spacing = false     # Future: ML-based spacing
enable_smart_position_sizing = false # Future: Confidence-based sizing

# ═══════════════════════════════════════════════════════════════════════════
# STRATEGIES CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[strategies]
active = ["grid"]
consensus_mode = "single"
enable_multi_timeframe = false
require_timeframe_alignment = false

[strategies.grid]
enabled = true
weight = 1.0
min_confidence = 0.6                # 🛡️ Higher confidence needed for conservative

[strategies.momentum]
enabled = false
weight = 0.8
min_confidence = 0.6
lookback_period = 20
threshold = 0.02

[strategies.mean_reversion]
enabled = false
weight = 0.7
min_confidence = 0.6
sma_period = 20
std_dev_multiplier = 2.0

[strategies.rsi]
enabled = false
weight = 0.9
min_confidence = 0.7
period = 14
oversold_threshold = 30.0
overbought_threshold = 70.0

# ═══════════════════════════════════════════════════════════════════════════
# RISK MANAGEMENT - V3.5 Format (Your values preserved!)
# ═══════════════════════════════════════════════════════════════════════════

[risk]
max_position_size_pct = 20.0        # 🛡️ Conservative 20% (your 30% → safer)
max_drawdown_pct = 5.0              # 🛡️ Your 5% daily loss → max drawdown
stop_loss_pct = 3.0                 # 🛡️ Your 3% stop loss (kept!)
take_profit_pct = 8.0               # 🛡️ Adjusted from 5% → more realistic
enable_circuit_breaker = true       # 🛡️ Your setting (kept!)
circuit_breaker_threshold_pct = 5.0 # 🛡️ Your 8% → 5% (more conservative)
circuit_breaker_cooldown_secs = 300 # 5 minute cooldown

# ═══════════════════════════════════════════════════════════════════════════
# PYTH PRICE FEED - V3.5 Required Section
# ═══════════════════════════════════════════════════════════════════════════

[pyth]
http_endpoint = "https://hermes.pyth.network"
feed_ids = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 2000           # 🛡️ Your original: slower updates (conservative)

# ═══════════════════════════════════════════════════════════════════════════
# PERFORMANCE TUNING
# ═══════════════════════════════════════════════════════════════════════════

[performance]
cycle_interval_ms = 100             # Standard 10Hz
startup_delay_ms = 1000

# ═══════════════════════════════════════════════════════════════════════════
# LOGGING CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

[logging]
level = "info"                      # Your original level
file_path = "logs/overnight_conservative.log"
enable_file_logging = true

# ═══════════════════════════════════════════════════════════════════════════
# METRICS & MONITORING
# ═══════════════════════════════════════════════════════════════════════════

[metrics]
enable_metrics = true
stats_interval = 50                 # Report every 50 cycles

# ═══════════════════════════════════════════════════════════════════════════
# DATABASE & ALERTS (Optional - Disabled for now)
# ═══════════════════════════════════════════════════════════════════════════

[database]
enabled = false

[alerts]
enabled = false
