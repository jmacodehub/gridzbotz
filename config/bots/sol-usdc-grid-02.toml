# ══════════════════════════════════════════════════════════════════════
# BOT CONFIG: sol-usdc-grid-02  (PR #90 — schema corrected)
# Pair:    SOL/USDC
# Mode:    PAPER (fleet validation — flip execution_mode="live" when ready)
# Capital: $3,000 USDC + 6 SOL
# Grid:    15 levels @ 0.30% spacing (tighter grid, more fills)
#
# Intentionally different from grid-01:
#   • Tighter spacing (0.30% vs 0.50%) — catches more micro-moves
#   • More levels (15 vs 10) — wider coverage at tighter intervals
#   • Smaller capital allocation — hedges fleet exposure
#   • Higher circuit breaker sensitivity (4% vs 5%)
#
# Works standalone:  cargo run -- --config config/bots/sol-usdc-grid-02.toml
# Works in fleet:    listed in config/orchestrator.toml bot_configs[]
# ══════════════════════════════════════════════════════════════════════

[bot]
name             = "GridzBot-SOL-USDC-02"
version          = "5.8.0"
environment      = "testing"
execution_mode   = "paper"
instance_id      = "sol-usdc-grid-02"

[network]
cluster          = "mainnet-beta"
rpc_url          = "https://api.mainnet-beta.solana.com"
commitment       = "confirmed"

[trading]
grid_levels             = 15
grid_spacing_percent    = 0.30
min_order_size          = 0.3
max_position_size       = 3.0
min_usdc_reserve        = 300.0
min_sol_reserve         = 0.5
volatility_window       = 20

[strategies]
active           = ["grid"]
consensus_mode   = "single"

[strategies.grid]
enabled          = true
weight           = 1.0

[risk]
max_position_size_pct           = 25.0
max_drawdown_pct                = 4.0
stop_loss_pct                   = 4.0
take_profit_pct                 = 8.0
enable_circuit_breaker          = true
circuit_breaker_threshold_pct   = 4.0
circuit_breaker_cooldown_secs   = 300

[paper_trading]
initial_usdc        = 3000.0
initial_sol         = 6.0
test_duration_hours = 24

[security]
wallet_path      = "~/.config/solana/id.json"

[performance]
cycle_interval_ms = 1000
startup_delay_ms  = 2500

[metrics]
enable_metrics   = true
stats_interval   = 30

[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = [
    "0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"
]
