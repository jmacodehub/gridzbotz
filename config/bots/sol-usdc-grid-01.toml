# ══════════════════════════════════════════════════════════════════════
# BOT CONFIG: sol-usdc-grid-01
# Pair: SOL/USDC | Mode: PAPER (fleet validation)
# Capital: $5,000 USDC | Grid levels: 10 | Spacing: 0.5%
#
# Part of the multi-bot fleet defined in config/orchestrator.toml.
# New pair = copy this file, update instance_name + capital + pair.
# ══════════════════════════════════════════════════════════════════════

[bot]
instance_name    = "sol-usdc-grid-01"
version          = "5.8.0"
environment      = "paper"
execution_mode   = "paper"

[network]
cluster          = "mainnet-beta"
rpc_url          = "https://api.mainnet-beta.solana.com"

[trading]
trading_pair     = "SOL/USDC"
grid_levels      = 10
grid_spacing_pct = 0.5
base_order_size  = 0.5
max_position     = 5.0
volatility_window = 20

[paper_trading]
initial_capital  = 5000.0
test_duration_hours = 24

[security]
wallet_path      = "~/.config/solana/id.json"

[performance]
cycle_interval_ms = 1000
startup_delay_ms  = 2000

[metrics]
enable_metrics   = true
stats_interval   = 30

[risk]
max_drawdown_pct = 5.0
daily_loss_limit = 200.0

[strategies]
enabled          = ["grid"]
consensus_threshold = 0.6

[pyth]
price_feed_id    = "0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"
