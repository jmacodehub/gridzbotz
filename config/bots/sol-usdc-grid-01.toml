# ══════════════════════════════════════════════════════════════════════
# BOT CONFIG: sol-usdc-grid-01  (PR #90 — schema corrected)
# Pair:    SOL/USDC
# Mode:    PAPER (fleet validation — flip execution_mode="live" when ready)
# Capital: $5,000 USDC + 10 SOL
# Grid:    10 levels @ 0.50% spacing (conservative, wide)
#
# Works standalone:  cargo run -- --config config/bots/sol-usdc-grid-01.toml
# Works in fleet:    listed in config/orchestrator.toml bot_configs[]
# New pair = copy this file, update [bot] name/instance_id + capital.
# ══════════════════════════════════════════════════════════════════════

[bot]
name             = "GridzBot-SOL-USDC-01"
version          = "5.8.0"
environment      = "testing"
execution_mode   = "paper"
instance_id      = "sol-usdc-grid-01"

[network]
cluster          = "mainnet-beta"
rpc_url          = "https://api.mainnet-beta.solana.com"
commitment       = "confirmed"

[trading]
grid_levels             = 10
grid_spacing_percent    = 0.50
min_order_size          = 0.5
max_position_size       = 5.0
min_usdc_reserve        = 500.0
min_sol_reserve         = 1.0
volatility_window       = 20

[strategies]
active           = ["grid"]
consensus_mode   = "single"

[strategies.grid]
enabled          = true
weight           = 1.0

[risk]
max_position_size_pct           = 30.0
max_drawdown_pct                = 5.0
stop_loss_pct                   = 5.0
take_profit_pct                 = 10.0
enable_circuit_breaker          = true
circuit_breaker_threshold_pct   = 5.0
circuit_breaker_cooldown_secs   = 300

[paper_trading]
initial_usdc        = 5000.0
initial_sol         = 10.0
test_duration_hours = 24

[security]
wallet_path      = "~/.config/solana/id.json"

[performance]
cycle_interval_ms = 1000
startup_delay_ms  = 2000

[metrics]
enable_metrics   = true
stats_interval   = 30

[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = [
    "0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"
]
