# ═══════════════════════════════════════════════════════════════════════════
#  🚀 BATTLE ROYALE V6 — CONFIG 5: MOMENTUM RIDER
#
#  Strategy: Conservative 5 bps gate with wide spacing
#  Edge Case: Catches only strong trends, ignores chop
#  Grid: 15 levels × 0.20% spacing (wide)
#
#  Expected Behavior:
#    - Pauses when vol < 0.05% (filters 80% of dead time)
#    - Trades only during high-volatility sessions
#    - Target: 5-15 fills in 18h, 1-3 repositions
#    - Risk: Misses most opportunities, ultra-safe
# ═══════════════════════════════════════════════════════════════════════════

test_name = "Battle Royale V6 - Momentum Rider (5bps gate)"

[bot]
name    = "GridzBot-MomentumRider"
version = "5.3.0"
environment = "testing"
execution_mode = "paper"
instance_id = "momentum-rider-v6"

[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"

[security]
wallet_path = "~/.config/solana/id.json"
require_password = false
max_trade_size_usdc = 50.0
max_transaction_amount_usdc = 50.0
max_daily_trades = 50
max_daily_volume_usdc = 200.0

[execution]
max_trade_sol = 0.5
priority_fee_microlamports = 50000
max_slippage_bps = 100
confirmation_timeout_secs = 60
max_retries = 3

[paper_trading]
initial_usdc = 5000.0
initial_sol  = 10.0
test_duration_hours = 18

[trading]
grid_levels          = 15
grid_spacing_percent = 0.20
min_order_size       = 0.1
max_position_size    = 100.0

min_usdc_reserve = 300.0
min_sol_reserve  = 2.0

enable_dynamic_grid  = true
volatility_window    = 100
enable_adaptive_spacing = false
reposition_threshold = 0.30

enable_auto_rebalance    = true
enable_smart_rebalance   = true
rebalance_threshold_pct  = 5.0
rebalance_cooldown_secs  = 60

max_orders_per_side          = 10
order_refresh_interval_secs  = 300
enable_market_orders         = false
enable_fee_optimization      = true

enable_order_lifecycle         = true
order_max_age_minutes          = 5
order_refresh_interval_minutes = 2
min_orders_to_maintain         = 8

min_profit_threshold_pct = 0.1
max_slippage_pct         = 1.0

enable_price_bounds = false
lower_price_bound   = 100.0
upper_price_bound   = 300.0

# 🚀 MOMENTUM RIDER: 5 bps gate (ultra-conservative)
enable_regime_gate       = true
min_volatility_to_trade  = 0.05
pause_in_very_low_vol    = true

enable_smart_position_sizing = false

[strategies]
active         = ["grid"]
consensus_mode = "single"
enable_multi_timeframe       = false
require_timeframe_alignment  = false

[strategies.grid]
enabled        = true
weight         = 1.0
min_confidence = 0.5
reposition_threshold_pct = 0.30

[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

[strategies.mean_reversion]
enabled            = false
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20
std_dev_multiplier = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold   = 20.0
extreme_overbought = 80.0

[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26

[risk]
max_position_size_pct         = 30.0
max_drawdown_pct              = 10.0
stop_loss_pct                 = 5.0
take_profit_pct               = 10.0
enable_circuit_breaker        = true
circuit_breaker_threshold_pct = 8.0
circuit_breaker_cooldown_secs = 300

[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500

[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 1000
request_timeout_ms = 5000

[logging]
level              = "info"
file_path          = "logs/battle-royale-v6/momentum-rider.log"
enable_file_logging = true

[metrics]
enable_metrics = true
stats_interval = 600

[database]
enabled = false

[alerts]
enabled = false
