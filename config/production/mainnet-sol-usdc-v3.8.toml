# ═══════════════════════════════════════════════════════════════════════
#  🚀 GRIDZBOTZ MAINNET V3.9 — SOL/USDC PRODUCTION
#
#  ✅ V3.9 (March 16, 2026 — PR #131 C4: WinRateGuard TOML sync):
#    + [risk] stop_loss_cooldown_secs = 300 (now canonical — was serde(default) only)
#    + [risk] enable_win_rate_guard   = false (safe opt-in — set true to activate)
#    + [risk] min_win_rate_pct          = 40.0
#    + [risk] win_rate_guard_resume_pct = 45.0
#    + [risk] min_trades_before_guard   = 10
#    Zero behaviour change — enable_win_rate_guard = false.
#    To activate on mainnet: set enable_win_rate_guard = true.
#    Conservative production tuning: min=50%, resume=55%, warmup=20.
#
#  ✅ V3.8 patch 2 (March 15, 2026 — V6.2 master.toml sync):
#    + [execution] max_requote_attempts = 3  (was absent)
#    + [trading]   vol_floor_resume_pct = 0.05  (was absent)
#    ~ [strategies] wma_confidence_threshold: 0.5 → 0.65  (BUG FIX)
#
#  ✅ V3.8 (March 14, 2026 — V6 Forensics Audit recommendations):
#    - grid_spacing_percent: 0.18 → 0.15 (more fills at ~$87 SOL)
#    - grid_levels:          10   → 15   (wider grid coverage)
#    - max_slippage_bps:     150  → 100  (tighter execution quality)
#    - rebalance_cooldown_secs: 120 → 60 (faster repositioning)
#    - stats_interval:       kept at 3000 (avoid Telegram spam)
#
#  ✅ Config System V6.1 (PR #124): GridRebalancer configurable vol floor
#  ✅ Config System V5.8 (PR #107): max/min_grid_spacing_pct wired
#  ✅ V3.7 (PR #102): Fill level_id wired + CB delta P&L fix
#  ✅ V3.6 + PR #99 + PR #100 + PR #101: ATR spacing, regime gates, Telegram
#
#  ⚠️  SECRETS — RPC keys and Telegram tokens are NEVER committed.
#    Option A — Environment variables (recommended for servers):
#      export GRIDZBOTZ_RPC_URL="https://solana-mainnet.core.chainstack.com/<KEY>"
#      export GRIDZBOTZ_RPC_FALLBACK="https://mainnet.helius-rpc.com/?api-key=<KEY>"
#      export GRIDZBOTZ_TELEGRAM_TOKEN=YOUR_TOKEN
#      export GRIDZBOTZ_TELEGRAM_CHAT_ID=YOUR_CHAT_ID
#
#    Option B — Local secrets file (gitignored, never committed):
#      Copy mainnet-sol-usdc-v3.7.secrets.toml.template
#      → mainnet-sol-usdc-v3.8.secrets.toml
#      Fill in your real keys. The *.secrets.toml pattern is in .gitignore.
#
#  Run: cargo run --release -- --config config/production/mainnet-sol-usdc-v3.8.toml
# ═══════════════════════════════════════════════════════════════════════


[bot]
name            = "GridzBot-Mainnet-V3.9"
version         = "6.3.0"   # V6.3 — WinRateGuard TOML sync (PR #131 C4)
environment     = "production"
execution_mode  = "live"
instance_id     = "mainnet-sol-usdc-v3.8"


# ─────────────────────────────────────────────────────────────────────────────
# NETWORK — Chainstack primary, Helius fallback
# Fill real keys in your local *.secrets.toml (gitignored) or via env vars.
# ─────────────────────────────────────────────────────────────────────────────
[network]
cluster    = "mainnet-beta"
rpc_url    = "https://solana-mainnet.core.chainstack.com/CHAINSTACK_KEY_PLACEHOLDER"
commitment = "confirmed"
# ws_url = "wss://solana-mainnet.core.chainstack.com/CHAINSTACK_KEY_PLACEHOLDER"


[security]
wallet_path      = "~/.config/solana/id.json"
require_password = false


# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION — Jupiter V6 swap caps + Helius fallback RPC
# max_slippage_bps: 150 → 100 (V3.8: tighter execution, 1% max slippage)
# max_requote_attempts: V6.1 field — RealTrader re-quote retries on slippage.
# ─────────────────────────────────────────────────────────────────────────────
[execution]
max_trade_sol              = 0.5
max_trade_size_usdc        = 50.0
priority_fee_microlamports = 10_000
max_slippage_bps           = 100
confirmation_timeout_secs  = 60
max_retries                = 4
max_requote_attempts       = 3
# jito_tip_lamports        = 10_000   # Uncomment when Jito bundle submit is live
rpc_fallback_urls = []


# ─────────────────────────────────────────────────────────────────────────────
# PRIORITY FEES — PriorityFeeEstimator V1.1
# Percentile-based, cached (10s TTL), bounded (1K–500K µLCU).
# ─────────────────────────────────────────────────────────────────────────────
[priority_fees]
enable_dynamic         = true
strategy               = "percentile"
percentile             = 75
multiplier             = 1.2
min_microlamports      = 2_000
max_microlamports      = 500_000
fallback_microlamports = 100_000
cache_ttl_secs         = 10
sample_blocks          = 150


[paper_trading]
initial_usdc        = 200.0
initial_sol         = 1.0
test_duration_hours = 1


# ─────────────────────────────────────────────────────────────────────────────
# TRADING — V3.8 tuning: tighter grid, more levels, faster rebalance
# ─────────────────────────────────────────────────────────────────────────────
[trading]
grid_levels          = 15
grid_spacing_percent = 0.15
min_order_size       = 0.05
max_position_size    = 50.0
min_usdc_reserve     = 20.0
min_sol_reserve      = 0.1

enable_dynamic_grid     = true
volatility_window       = 100
enable_adaptive_spacing = true
reposition_threshold    = 0.30
max_grid_spacing_pct    = 0.0075
min_grid_spacing_pct    = 0.001

enable_auto_rebalance   = true
enable_smart_rebalance  = true
rebalance_threshold_pct = 5.0
rebalance_cooldown_secs = 60

max_orders_per_side         = 5
order_refresh_interval_secs = 120
enable_market_orders        = false
enable_fee_optimization     = true

enable_order_lifecycle         = true
order_max_age_minutes          = 5
order_refresh_interval_minutes = 2
min_orders_to_maintain         = 4

min_profit_threshold_pct = 0.25
max_slippage_pct         = 1.5

enable_price_bounds = false
lower_price_bound   = 50.0
upper_price_bound   = 500.0

# ─── Market regime gate ───────────────────────────────────────────────────────
enable_regime_gate      = true
min_volatility_to_trade = 0.05
vol_floor_resume_pct    = 0.05
pause_in_very_low_vol   = false

enable_smart_position_sizing = true
signal_size_multiplier       = 1.0

optimizer_interval_cycles = 50

[trading.fee_filter]
enable_smart_fee_filter = true
min_fee_threshold_bps   = 8
max_fee_threshold_bps   = 50
fee_filter_window_secs  = 30


# ─────────────────────────────────────────────────────────────────────────────
# STRATEGIES
# ─────────────────────────────────────────────────────────────────────────────
[strategies]
active         = ["grid"]
consensus_mode = "single"
wma_confidence_threshold    = 0.65
enable_multi_timeframe      = false
require_timeframe_alignment = false

[strategies.grid]
enabled            = true
weight             = 1.0
min_confidence     = 0.5
seed_orders_bypass = true

[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

[strategies.mean_reversion]
enabled               = false
weight                = 0.7
min_confidence        = 0.6
sma_period            = 20
std_dev_multiplier    = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold     = 20.0
extreme_overbought   = 80.0

[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26


# ─────────────────────────────────────────────────────────────────────────────
# RISK
# ─────────────────────────────────────────────────────────────────────────────
[risk]
max_position_size_pct         = 30.0
max_drawdown_pct              = 5.0
stop_loss_pct                 = 3.0
take_profit_pct               = 8.0
enable_circuit_breaker        = true
circuit_breaker_threshold_pct = 4.0
circuit_breaker_cooldown_secs = 300
max_consecutive_losses        = 5
enable_trailing_stop          = false

# 🆕 PR #126 C3: Stop-loss cooldown — seconds trading is suppressed after SL trips.
# 300s = 5 min standard default. Set 180s for faster re-entry or 600s conservative.
stop_loss_cooldown_secs = 300

# 🆕 PR #131 C4: Win Rate Guard — suppress trading when win-rate degrades.
#
# DISABLED by default — zero behaviour change from V3.8.
# To activate on mainnet, set enable_win_rate_guard = true.
#
# Conservative production tuning recommendation:
#   enable_win_rate_guard     = true
#   min_win_rate_pct          = 50.0   # tighter than master default (40%)
#   win_rate_guard_resume_pct = 55.0   # wider hysteresis band for production
#   min_trades_before_guard   = 20     # larger warmup window for mainnet
#
# Escalation ladder: SL cooldown → Win Rate Guard → Regime gate → CB
enable_win_rate_guard     = false   # opt-in — set true to activate
min_win_rate_pct          = 40.0   # suppress below 40% (conservative: 50.0)
win_rate_guard_resume_pct = 45.0   # resume above 45% (conservative: 55.0)
min_trades_before_guard   = 10     # warmup window (conservative: 20)


# ─────────────────────────────────────────────────────────────────────────────
# FEES — Jupiter V6 SOL/USDC reference rates (BPS)
# ─────────────────────────────────────────────────────────────────────────────
[fees]
maker_fee_bps             = 2.0
taker_fee_bps             = 4.0
slippage_bps              = 5.0
min_profit_multiplier     = 2.0
enable_smart_filter       = false
market_impact_coefficient = 0.01


[pyth]
http_endpoint      = "https://hermes.pyth.network"
feed_ids           = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500


[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 2000
request_timeout_ms = 5000


[logging]
level               = "info"
file_path           = "logs/mainnet/mainnet-sol-usdc-v3.8.log"
enable_file_logging = true


[metrics]
enable_metrics = true
stats_interval = 3000   # kept at 3000 — avoid Telegram spam


[database]
enabled = false


# ═══════════════════════════════════════════════════════════════════════
#  🔔 ALERTS — Telegram Mobile Notifications (PR #101)
#
#  Setup (one-time, ~2 minutes):
#    1. Open Telegram → search @BotFather → /newbot
#    2. Copy the token it gives you
#    3. Start a chat with your bot, send /start
#    4. Visit: https://api.telegram.org/botYOUR_TOKEN/getUpdates
#       Find "chat":{"id":XXXXXXXXX} — that is your chat_id
#    5. Export credentials (NEVER commit real values):
#         export GRIDZBOTZ_TELEGRAM_TOKEN=YOUR_TOKEN
#         export GRIDZBOTZ_TELEGRAM_CHAT_ID=YOUR_CHAT_ID
#
#  Notifications fired:
#    🚀 Bot started | 💰 Every SELL fill | 🚨 Circuit breaker tripped
#    ✅ Circuit breaker reset | 📊 Heartbeat | 🏁 Shutdown summary
#
#  If env vars are absent — silent no-op, zero impact on trading.
# ═══════════════════════════════════════════════════════════════════════
[alerts]
enabled = true
