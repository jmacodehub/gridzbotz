# ═══════════════════════════════════════════════════════════════════════════
#  🚀 GRIDZBOTZ MAINNET V3.7 — SOL/USDC PRODUCTION
#
#  ✅ Config System V5.8 (PR #107): max/min_grid_spacing_pct wired
#  ✅ V3.7 (PR #102): Fill level_id wired + CB delta P&L fix
#    GridStateTracker.mark_buy/sell_filled() now called in live mode.
#    CB receives per-fill P&L delta (not cumulative snapshot).
#    RealTradingEngine emits synthetic FillEvents from confirmed Jupiter swaps.
#    GridBot V6.2 | RealTradingEngine V3.2
#
#  ✅ V3.6 + PR #99 + PR #100 + PR #101:
#    ATR Dynamic Spacing, Dual vol gates, Tighter retries
#    QuickNode fallback, Enhanced regime detection
#    wma_confidence_threshold = 0.65 (PR #100)
#    Telegram alerts fully wired (PR #101)
#
#  ⚠️  SECRETS: rpc_url / rpc_fallback_urls / Telegram credentials
#    are NOT committed. Set them via environment variables:
#      export GRIDZBOTZ_RPC_URL="https://solana-mainnet.core.chainstack.com/<KEY>"
#      export GRIDZBOTZ_RPC_FALLBACK="https://solana-mainnet.quiknode.pro/<KEY>/"
#      export GRIDZBOTZ_TELEGRAM_TOKEN=YOUR_TOKEN
#      export GRIDZBOTZ_TELEGRAM_CHAT_ID=YOUR_CHAT_ID
#    Or fill in the placeholder values below in your local .gitignore'd copy.
#
#  Run: cargo run --release -- --config config/production/mainnet-sol-usdc-v3.7.toml
# ═══════════════════════════════════════════════════════════════════════════


[bot]
name            = "GridzBot-Mainnet-V3.7"
version         = "3.7.0"
environment     = "production"
execution_mode  = "live"
instance_id     = "mainnet-sol-usdc-v3.7"


# ─────────────────────────────────────────────────────────────────────────────
# NETWORK — Chainstack primary, QuickNode fallback
# Replace <CHAINSTACK_KEY> / <QUICKNODE_KEY> in your local .gitignore'd copy.
# ─────────────────────────────────────────────────────────────────────────────
[network]
cluster    = "mainnet-beta"
rpc_url    = "https://solana-mainnet.core.chainstack.com/CHAINSTACK_KEY_PLACEHOLDER"
commitment = "confirmed"
# ws_url is optional — uncomment when you need WebSocket price streaming
# ws_url = "wss://solana-mainnet.core.chainstack.com/CHAINSTACK_KEY_PLACEHOLDER"


[security]
wallet_path      = "~/.config/solana/id.json"
require_password = false


# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION — Jupiter V6 swap caps + fallback RPC pool
# jito_tip_lamports is commented out — enable only when Jito bundle routing is
# wired end-to-end in realtrader.rs (see R&D pipeline).
# ─────────────────────────────────────────────────────────────────────────────
[execution]
max_trade_sol                  = 0.5
max_trade_size_usdc            = 50.0
priority_fee_microlamports     = 100_000
max_slippage_bps               = 150
confirmation_timeout_secs      = 60
max_retries                    = 4
# jito_tip_lamports            = 10_000   # Uncomment when Jito bundle submit is live
rpc_fallback_urls              = [
    "https://solana-mainnet.quiknode.pro/QUICKNODE_KEY_PLACEHOLDER/",
]


# ─────────────────────────────────────────────────────────────────────────────
# PRIORITY FEES — PriorityFeeEstimator V1.1
# Percentile-based, cached (10s TTL), bounded (1K–500K µLCU).
# Strategy: "percentile" is the validated production path.
# ─────────────────────────────────────────────────────────────────────────────
[priority_fees]
enable_dynamic         = true
strategy               = "percentile"
percentile             = 50
multiplier             = 1.2
min_microlamports      = 1_000
max_microlamports      = 500_000
fallback_microlamports = 100_000
cache_ttl_secs         = 10
sample_blocks          = 150


# ─────────────────────────────────────────────────────────────────────────────
# PAPER TRADING — kept for quick paper regression without a separate TOML
# Ignored entirely when execution_mode = "live"
# ─────────────────────────────────────────────────────────────────────────────
[paper_trading]
initial_usdc        = 200.0
initial_sol         = 1.0
test_duration_hours = 1


# ─────────────────────────────────────────────────────────────────────────────
# TRADING — V5.8 fields fully populated
# ─────────────────────────────────────────────────────────────────────────────
[trading]
# Core grid
grid_levels          = 20
grid_spacing_percent = 0.18
min_order_size       = 0.05
max_position_size    = 50.0
min_usdc_reserve     = 20.0
min_sol_reserve      = 0.1

# Dynamic grid (V5.8: spacing bounds now config-driven, not hardcoded)
enable_dynamic_grid     = true
volatility_window       = 100
enable_adaptive_spacing = true
reposition_threshold    = 0.30
max_grid_spacing_pct    = 0.0075   # 0.75% — was hardcoded in GridRebalancerConfig
min_grid_spacing_pct    = 0.001    # 0.10% — was hardcoded in GridRebalancerConfig

# Auto-rebalance
enable_auto_rebalance    = true
enable_smart_rebalance   = true
rebalance_threshold_pct  = 5.0
rebalance_cooldown_secs  = 120

# Order management
max_orders_per_side          = 10
order_refresh_interval_secs  = 120
enable_market_orders         = false
enable_fee_optimization      = true

# Order lifecycle (production: force-enabled by apply_environment)
enable_order_lifecycle         = true
order_max_age_minutes          = 5
order_refresh_interval_minutes = 2
min_orders_to_maintain         = 8

# Risk / profitability
min_profit_threshold_pct = 0.25
max_slippage_pct         = 1.5

# Price bounds (disabled — let regime gate handle range)
enable_price_bounds = false
lower_price_bound   = 50.0
upper_price_bound   = 500.0

# Market regime gate (production env force-enables this; values still explicit for clarity)
enable_regime_gate       = true
min_volatility_to_trade  = 0.30   # 0.3% minimum — production floor enforced by apply_environment
pause_in_very_low_vol    = false

# Smart position sizing (V5.5)
# signal_size_multiplier valid range: [0.5, 3.0] when enable=true
# 1.0 = flat / zero effect — safe default, opt-in via raising the multiplier
enable_smart_position_sizing = true
signal_size_multiplier       = 1.0

# Adaptive optimizer cadence (V5.3) — default 50 cycles
optimizer_interval_cycles = 50

# ── SmartFeeFilter sub-section (V5.4 / PR #94 Commit 3) ──────────────────
# Levels whose projected fee (in BPS) falls outside [min, max] are skipped.
[trading.fee_filter]
enable_smart_fee_filter  = true
min_fee_threshold_bps    = 8    # skip suspiciously cheap levels (stale quote)
max_fee_threshold_bps    = 50   # skip levels that eat the whole spread
fee_filter_window_secs   = 30   # rolling avg fee window


# ─────────────────────────────────────────────────────────────────────────────
# STRATEGIES
# ─────────────────────────────────────────────────────────────────────────────
[strategies]
active         = ["grid"]
consensus_mode = "single"

# WMA confidence gate — 0.65 = balanced (historic default, paper-validated)
# 0.50 lenient | 0.65 balanced | 0.75 strict | 0.85 very strict
wma_confidence_threshold = 0.65

enable_multi_timeframe       = false
require_timeframe_alignment  = false

[strategies.grid]
enabled             = true
weight              = 1.0
min_confidence      = 0.5
seed_orders_bypass  = true   # V5.7 / PR #100: skip initial seed sequence on (re)start

[strategies.momentum]
enabled        = false
weight         = 0.8
min_confidence = 0.6
lookback_period = 20
threshold       = 0.02

[strategies.mean_reversion]
enabled             = false
weight              = 0.7
min_confidence      = 0.6
sma_period          = 20
std_dev_multiplier  = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold     = 20.0
extreme_overbought   = 80.0

[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26


# ─────────────────────────────────────────────────────────────────────────────
# RISK
# ─────────────────────────────────────────────────────────────────────────────
[risk]
max_position_size_pct         = 30.0
max_drawdown_pct              = 5.0
stop_loss_pct                 = 3.0
take_profit_pct               = 8.0
enable_circuit_breaker        = true
circuit_breaker_threshold_pct = 4.0
circuit_breaker_cooldown_secs = 300
max_consecutive_losses        = 5
enable_trailing_stop          = false   # V5.2 / PR #89 — opt-in when StopLossManager is production-tested


# ─────────────────────────────────────────────────────────────────────────────
# FEES — Jupiter V6 SOL/USDC reference rates (BPS)
# ─────────────────────────────────────────────────────────────────────────────
[fees]
maker_fee_bps             = 2.0
taker_fee_bps             = 4.0
slippage_bps              = 5.0
min_profit_multiplier     = 2.0
enable_smart_filter       = false
market_impact_coefficient = 0.01


# ─────────────────────────────────────────────────────────────────────────────
# PYTH — SOL/USD price feed (Hermes HTTP, 500ms polling)
# feed_id: SOL/USD Pyth mainnet price account
# ─────────────────────────────────────────────────────────────────────────────
[pyth]
http_endpoint      = "https://hermes.pyth.network"
feed_ids           = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500


[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 2000
request_timeout_ms = 5000


[logging]
level               = "info"
file_path           = "logs/mainnet/mainnet-sol-usdc-v3.7.log"
enable_file_logging = true


[metrics]
enable_metrics = true
stats_interval = 50


[database]
enabled = false


# ═══════════════════════════════════════════════════════════════════════════
#  🔔 ALERTS — Telegram Mobile Notifications (PR #101)
#
#  Setup (one-time, ~2 minutes):
#    1. Open Telegram → search @BotFather → /newbot
#    2. Copy the token it gives you
#    3. Start a chat with your bot, send /start
#    4. Visit: https://api.telegram.org/botYOUR_TOKEN/getUpdates
#       Find "chat":{"id":XXXXXXXXX} — that is your chat_id
#    5. Export credentials (never commit them):
#         export GRIDZBOTZ_TELEGRAM_TOKEN=YOUR_TOKEN
#         export GRIDZBOTZ_TELEGRAM_CHAT_ID=YOUR_CHAT_ID
#
#  You will receive:
#    🚀 Bot started (pair, capital, spacing, WMA gate, mode)
#    💰 Every SELL fill (price, size, Δ P&L, fill #)
#    🚨 Circuit breaker tripped (reason, drawdown, cooldown)
#    ✅ Circuit breaker reset (trading resumed)
#    📊 Heartbeat every 50 cycles ~5s (NAV, P&L, ROI, win rate)
#    🏁 Shutdown summary (uptime, fills, P&L, ROI, win rate)
#
#  If env vars are absent — silent no-op, zero impact on trading.
# ═══════════════════════════════════════════════════════════════════════════
[alerts]
enabled = true   # ✅ PR #101: Telegram wired — set env vars to activate
