# ═══════════════════════════════════════════════════════════════════════════
#  🧪 SMOKE TEST CONFIG — V6.4 (PR #107)
#  Purpose: Quick wiring check — fills, fees, lifecycle, feed all working
#  Fills expected: 2–10 (regime gate DISABLED, tight 0.08% spacing)
#
#  Run: cargo run -- --config config/testing/smoke_test.toml
#
#  Pass criteria:
#   ✅ PaperTradingEngine initializes ($1000 USDC + 5 SOL)
#   ✅ Pyth feed connects and delivers live prices
#   ✅ Grid places 20 orders at startup (no emergency-init warning)
#   ✅ At least 1 fill occurs (proves fill simulation pipeline works)
#   ✅ Fee reconciliation lines printed (PR #107 C4):
#        [BOT-V6.4] TakerFee: 0.0000% (0.0 bps) (PR #107 C4)
#        [FEES] Total fees paid (grid levels): $0.0000
#   ✅ 0 errors, 0 blocks across all cycles
#   ✅ Graceful shutdown + final summary printed
#
#  Changelog:
#   V6.4 (PR #107): sync to master canonical fields — remove stale
#     max_daily_trades/max_daily_volume_usdc from [security],
#     add [fees], [trading.fee_filter], seed_orders_bypass,
#     max_consecutive_losses, enable_trailing_stop,
#     optimizer_interval_cycles, signal_size_multiplier,
#     max/min_grid_spacing_pct
# ═══════════════════════════════════════════════════════════════════════════

[bot]
name           = "SmokeTest-Bot"
version        = "6.4.0"
environment    = "testing"
execution_mode = "paper"
instance_id    = "smoke-test-1"

[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"

[security]
wallet_path      = "~/.config/solana/id.json"
require_password = false
# max_daily_trades / max_daily_volume_usdc REMOVED (V5.4.1: moved to [execution])
# authorized_programs = ["JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4"]

[execution]
max_trade_sol              = 1.0
max_trade_size_usdc        = 100.0
priority_fee_microlamports = 50000
max_slippage_bps           = 100
confirmation_timeout_secs  = 60
max_retries                = 3

[priority_fees]
enable_dynamic         = false
strategy               = "percentile"
percentile             = 50
multiplier             = 1.2
min_microlamports      = 1_000
max_microlamports      = 500_000
fallback_microlamports = 100_000
cache_ttl_secs         = 10
sample_blocks          = 150

[paper_trading]
initial_usdc = 1000.0
initial_sol  = 5.0

[trading]
# Tight grid maximises fill probability in short smoke window
grid_levels          = 20
grid_spacing_percent = 0.08           # Tight — catches any SOL movement
min_order_size       = 0.1
max_position_size    = 50.0

min_usdc_reserve = 100.0
min_sol_reserve  = 0.5

enable_dynamic_grid  = false          # Static — reproducible test runs
volatility_window    = 100

reposition_threshold = 0.3

enable_auto_rebalance    = true
enable_smart_rebalance   = false
rebalance_threshold_pct  = 5.0
rebalance_cooldown_secs  = 60

max_orders_per_side          = 10
order_refresh_interval_secs  = 180
enable_market_orders         = false
enable_fee_optimization      = true

enable_order_lifecycle         = true
order_max_age_minutes          = 5
order_refresh_interval_minutes = 2
min_orders_to_maintain         = 6

min_profit_threshold_pct = 0.05
max_slippage_pct         = 1.0

enable_price_bounds = false

# 🚨 REGIME GATE DISABLED — smoke test MUST produce fills
enable_regime_gate       = false
min_volatility_to_trade  = 0.0
max_volatility_to_trade  = 100.0
pause_in_very_low_vol    = false

enable_adaptive_spacing      = false
enable_smart_position_sizing = false
signal_size_multiplier       = 1.0

# PR #94: Optimizer cadence (default 50 — identical to old hardcoded value)
optimizer_interval_cycles = 50

# PR #107 C2: TOML-driven spacing bounds (defaults match GridRebalancerConfig)
max_grid_spacing_pct = 0.0075        # 0.75% ceiling
min_grid_spacing_pct = 0.001         # 0.10% floor

[trading.fee_filter]
# PR #94: Fee filter DISABLED for smoke test — never block seed orders
enable_smart_fee_filter = false
min_fee_threshold_bps   = 1
max_fee_threshold_bps   = 100
fee_filter_window_secs  = 30

[strategies]
active         = ["grid"]
consensus_mode = "single"

enable_multi_timeframe      = false
require_timeframe_alignment = false

# WMA confidence gate — low threshold ensures smoke test always trades
wma_confidence_threshold = 0.0

[strategies.grid]
enabled        = true
weight         = 1.0
min_confidence = 0.3
# PR #106: bypass SmartFeeFilter for initial grid seeding only
seed_orders_bypass = true
reposition_threshold_pct = 0.30

[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

[strategies.mean_reversion]
enabled            = false
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20
std_dev_multiplier = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold     = 20.0
extreme_overbought   = 80.0

[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26

[risk]
max_position_size_pct         = 40.0   # Relaxed — don’t restrict smoke test
max_drawdown_pct              = 50.0   # Don’t trip circuit breaker
stop_loss_pct                 = 20.0
take_profit_pct               = 50.0
enable_circuit_breaker        = false  # Disabled — allow free trading
circuit_breaker_threshold_pct = 99.0
circuit_breaker_cooldown_secs = 60
# PR #79: consecutive-loss guard (high — don’t trip on smoke test)
max_consecutive_losses = 50
# PR #89: fixed stop (default) — no trailing stop in smoke test
enable_trailing_stop = false

# PR #107 C4: [fees] — single source of truth
# taker_fee_bps = 0.0 for paper mode — zero behaviour change
# Confirms fee reconciliation pipeline is wired without charging fake fees
[fees]
maker_fee_bps             = 0.0
taker_fee_bps             = 0.0
slippage_bps              = 5.0
min_profit_multiplier     = 2.0
enable_smart_filter       = false
market_impact_coefficient = 0.01

[pyth]
http_endpoint      = "https://hermes.pyth.network"
feed_ids           = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500

[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 500
request_timeout_ms = 5000

[logging]
level               = "info"
file_path           = "logs/testing/smoke-test-1.log"
enable_file_logging = true

[metrics]
enable_metrics = true
stats_interval = 50                   # Stats every ~5 seconds at 100ms cycles

[database]
enabled = false

[alerts]
enabled = false
