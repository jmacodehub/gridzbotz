# ═══════════════════════════════════════════════════════════════════════════
#  🧪 SMOKE TEST CONFIG
#  Purpose: Quick wiring check — fills, lifecycle, feed all working
#  Fills expected: 2-10 (regime gate DISABLED, tight 0.08% spacing)
#
#  Run: cargo run --release -- --config config/testing/smoke_test.toml --paper --duration-minutes 5
#
#  Pass criteria:
#   ✅ PaperTradingEngine initializes ($1000 USDC + 5 SOL)
#   ✅ Pyth feed connects and delivers live prices
#   ✅ Grid places 20 orders at startup (no emergency-init warning)
#   ✅ At least 1 fill occurs (proves fill simulation pipeline works)
#   ✅ 0 errors, 0 blocks across all cycles
#   ✅ Graceful shutdown + final summary printed
# ═══════════════════════════════════════════════════════════════════════════


[bot]
name           = "SmokeTest-Bot"
version        = "5.4.1"
environment    = "testing"
execution_mode = "paper"
instance_id    = "smoke-test-1"

[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"

[security]
wallet_path      = "~/.config/solana/id.json"
require_password = false
max_daily_trades      = 1000
max_daily_volume_usdc = 5000.0

[execution]
max_trade_sol              = 1.0
max_trade_size_usdc        = 100.0
priority_fee_microlamports = 50000
max_slippage_bps           = 100
confirmation_timeout_secs  = 60
max_retries                = 3

[paper_trading]
initial_usdc = 1000.0
initial_sol  = 5.0

[trading]
# Tight grid maximises fill probability in short 5-minute window
grid_levels          = 20
grid_spacing_percent = 0.08           # Tight — catches any SOL movement
min_order_size       = 0.1
max_position_size    = 50.0

min_usdc_reserve = 100.0
min_sol_reserve  = 0.5

enable_dynamic_grid  = false          # Static — reproducible test runs
volatility_window    = 100

reposition_threshold = 0.3

enable_auto_rebalance    = true
enable_smart_rebalance   = false
rebalance_threshold_pct  = 5.0
rebalance_cooldown_secs  = 60

max_orders_per_side          = 10
order_refresh_interval_secs  = 180
enable_market_orders         = false
enable_fee_optimization      = true

enable_order_lifecycle         = true
order_max_age_minutes          = 5
order_refresh_interval_minutes = 2
min_orders_to_maintain         = 6

min_profit_threshold_pct = 0.05
max_slippage_pct         = 1.0

enable_price_bounds = false

# 🚨 REGIME GATE DISABLED — smoke test MUST produce fills
enable_regime_gate       = false
min_volatility_to_trade  = 0.0
max_volatility_to_trade  = 100.0      # Effectively no ceiling either
pause_in_very_low_vol    = false

enable_adaptive_spacing      = false
enable_smart_position_sizing = false

[strategies]
active         = ["grid"]
consensus_mode = "single"

enable_multi_timeframe      = false
require_timeframe_alignment = false

[strategies.grid]
enabled                  = true
weight                   = 1.0
min_confidence           = 0.3         # Very low — accept any signal
reposition_threshold_pct = 0.30

[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

[strategies.mean_reversion]
enabled            = false
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20
std_dev_multiplier = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold     = 20.0
extreme_overbought   = 80.0

[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26

[risk]
max_position_size_pct         = 40.0   # Relaxed — don't restrict smoke test
max_drawdown_pct              = 50.0   # Don't trip circuit breaker
stop_loss_pct                 = 20.0
take_profit_pct               = 50.0
enable_circuit_breaker        = false  # Disabled — allow free trading
circuit_breaker_threshold_pct = 99.0
circuit_breaker_cooldown_secs = 60

[pyth]
http_endpoint      = "https://hermes.pyth.network"
feed_ids           = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500

[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 500              # Fast startup for quick tests
request_timeout_ms = 5000

[logging]
level               = "debug"         # Debug for maximum visibility
file_path           = "logs/testing/smoke-test-1.log"
enable_file_logging = true

[metrics]
enable_metrics = true
stats_interval = 50                   # Stats every 5 seconds

[database]
enabled = false

[alerts]
enabled = false
