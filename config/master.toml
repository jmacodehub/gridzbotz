# ═══════════════════════════════════════════════════════════════════════════
#  ⚙️  PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════
[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 1000
# Timeout guide: 3000ms (scalper — fail fast) | 5000ms (standard)
request_timeout_ms = 5000

# ═══════════════════════════════════════════════════════════════════════════
#  📋 LOGGING
# ═══════════════════════════════════════════════════════════════════════════
[logging]
level              = "info"
# 🆕 V5.4.1: Use instance_id in log path pattern for multi-bot clarity
