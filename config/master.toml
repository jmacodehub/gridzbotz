#  It controls the floor that apply_environment("production") enforces on
#  min_volatility_to_trade. Default: 0.05.
#
#  Relationship between the two vol fields:
#    min_volatility_to_trade  — your desired trading threshold (set this)
#    vol_floor_resume_pct     — production safety minimum (default 0.05)
#
#  apply_environment("production") raises min_volatility_to_trade to
#  vol_floor_resume_pct ONLY if min_volatility_to_trade < vol_floor_resume_pct.
#
#  Examples:
#    min_volatility_to_trade = 0.08, vol_floor_resume_pct = 0.05
#      → production keeps 0.08 (already above floor) ✅
#    min_volatility_to_trade = 0.02, vol_floor_resume_pct = 0.05
#      → production raises to 0.05 ⚠️ (floor wins)
#    min_volatility_to_trade = 0.02, vol_floor_resume_pct = 0.02
#      → production keeps 0.02 (floor lowered intentionally) ✅
