# ═══════════════════════════════════════════════════════════════════════════
#  🤖 BOT CORE
# ═══════════════════════════════════════════════════════════════════════════
[bot]
name    = "GridzBot-Master"
version = "5.6.1"    # V5.6.1 — PR #106: seed bypass fixes Orders=0 on low-vol
environment = "testing"              # testing | development | production

# 🔑 EXECUTION MODE — The single most important knob:
#
#   🟡 "paper" → PaperTradingEngine
#      - Simulated fills with realistic slippage + fees
#      - No real funds at risk
#      - Safe for testing strategies and grid tuning
#      - Fills logged to CSV for analysis
#
#   🔴 "live" → RealTradingEngine
#      - Real Jupiter atomic swaps on Solana
#      - Real SOL/USDC at risk
#      - Circuit breaker active (trips at 5% drawdown)
#      - Requires min $10 capital for safety
#      - Requires [security] section with valid wallet_path
#
# CLI override: --mode live or --paper (takes precedence over this setting)
# For first live test: cargo run -- --config config/production/mainnet-sol-usdc-v1.toml
#
execution_mode = "paper"             # Default: paper (safe)

# Unique instance name — appears in all logs, CSV fills, and metrics.
# Change this when running multiple bots simultaneously so you can tell them apart.
# e.g., "live-mainnet-v1", "paper-scalper-rd", "conservative-1"
instance_id = "master-paper-1"

# ═══════════════════════════════════════════════════════════════════════════
#  🌐 NETWORK
# ═══════════════════════════════════════════════════════════════════════════
[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"             # processed | confirmed | finalized

# 🔮 Future hook — WebSocket subscription (lower latency price feed)
# ws_url = "wss://api.devnet.solana.com"

# For mainnet live trading, use:
# cluster    = "mainnet-beta"
# rpc_url    = "https://solana-mainnet.core.chainstack.com/YOUR_KEY"

# ═══════════════════════════════════════════════════════════════════════════
#  🔐 SECURITY — Wallet & Transaction Safety Limits
#  Required when execution_mode = "live"
#  Ignored in paper mode (safe to leave in all configs)
# ═══════════════════════════════════════════════════════════════════════════
[security]
# Path to Solana keypair file (JSON format).
# - Devnet:  ~/.config/solana/devnet-keypair.json
# - Mainnet: ~/.config/solana/id.json
# - NEVER commit mainnet keys to git!
wallet_path = "~/.config/solana/id.json"

# Future encrypted keypair support (Stage 4)
require_password = false

# Optional whitelist of authorized Solana program IDs (Stage 4)
# authorized_programs = ["JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4"]

# ⚠️  V5.4.1: max_trade_size_usdc MOVED to [execution] — it was silently ignored here.
# max_transaction_amount_usdc is DEPRECATED — use max_trade_size_usdc in [execution].
#max_daily_trades      = 100
#max_daily_volume_usdc = 500.0

# ═══════════════════════════════════════════════════════════════════════════
#  ⚡ EXECUTION (Live Trading Knobs)
#  Only enforced when execution_mode = "live"
#  Safe to leave in any config — parsed but ignored in paper mode
# ═══════════════════════════════════════════════════════════════════════════
[execution]
# Hard cap per single Jupiter swap (SOL).
max_trade_sol = 0.5

# 🆕 V5.4.1: Max USDC value per single trade — moved HERE from [security]
# where it was silently ignored. Whichever limit (max_trade_sol OR
# max_trade_size_usdc) hits first wins.
# Production reference: mainnet-sol-usdc-v1 uses $50 for conservative start.
max_trade_size_usdc = 250.0

# Priority fee in microlamports added to every transaction.
# 50_000 µlamports ≈ 0.00005 SOL per tx at current Solana base fee.
priority_fee_microlamports = 50000

# Max acceptable slippage in BPS (basis points). 100 BPS = 1.0%.
# SOL/USDC is highly liquid — 50–150 BPS is typical and safe.
# Scalper profile uses 50 BPS (tighter). Production uses 150 BPS.
max_slippage_bps = 100

# Jito MEV protection tip (lamports) — protects against sandwich attacks.
# Uncomment to enable (~0.00001 SOL per trade, worth it on mainnet >$500).
# jito_tip_lamports = 10000

# RPC fallback URLs — tried in order if the primary RPC fails.
# rpc_fallback_urls = ["https://api.mainnet-beta.solana.com"]

confirmation_timeout_secs = 60
max_retries = 3

# ═══════════════════════════════════════════════════════════════════════════
#  ⚡ PRIORITY FEES — Dynamic Compute-Unit Priority Fee Estimation
#
#  Controls Solana priority fee calculation per transaction.
#  When enable_dynamic = false (default), uses static
#  execution.priority_fee_microlamports value.
#
#  Enable for production: copies the section to your pair config and
#  set enable_dynamic = true. See production TOML for tuning guide.
#
#  Unit: microlamports per compute unit (µL/CU).
#  Conversion: max_lamports = µL/CU × estimated_CU (300K) / 1_000_000
# ═══════════════════════════════════════════════════════════════════════════
[priority_fees]
enable_dynamic         = false         # Safe default — uses static fee from [execution]
strategy               = "percentile"  # "percentile" | "fixed"
percentile             = 50            # P50 = median of recent blocks
multiplier             = 1.2           # 20% headroom
min_microlamports      = 1_000         # µL/CU floor
max_microlamports      = 500_000       # µL/CU ceiling
fallback_microlamports = 100_000       # On RPC failure (matches production static)
cache_ttl_secs         = 10            # Re-sample interval
sample_blocks          = 150           # Blocks to sample (max 150 on Solana)

# ═══════════════════════════════════════════════════════════════════════════
#  💰 PAPER TRADING
# ═══════════════════════════════════════════════════════════════════════════
[paper_trading]
initial_usdc = 5000.0
initial_sol  = 10.0

# Duration — choose ONE method (others are ignored):
# Method 1: Hours  (simplest)
test_duration_hours = 1
# Method 2: Minutes (more flexible)  → uncomment to use
# test_duration_minutes = 30
# Method 3: Exact cycle count        → uncomment to use (expert mode)
# test_cycles = 3000

# ═══════════════════════════════════════════════════════════════════════════
#  📊 TRADING — Core Grid + Behaviour Knobs
# ═══════════════════════════════════════════════════════════════════════════
[trading]

# ─── Core Grid ─────────────────────────────────────────────────────────────
# Battle Royale reference results (Feb 2026):
#   Production winner: 20 levels × 0.18%  — max-levels-titan
#   Efficiency winner: 22 levels × 0.25%  — conservative-ai (beats 35×0.15%)
#   Tightest viable:   50 levels × 0.08%  — scalper (Pyth confidence ±0.03%)
grid_levels          = 35            # Baseline template — tune per profile
grid_spacing_percent = 0.15          # 0.15% spacing baseline
min_order_size       = 0.1           # Minimum order size in SOL
max_position_size    = 100.0         # Hard cap on total position (SOL)

# ─── Note on max_orders_per_side ─────────────────────────────────────────
# Rule: max_orders_per_side = grid_levels / 2
# e.g., 20 levels → 10 per side, 22 levels → 11 per side, 50 levels → 15+ per side

# ─── Reserves (Never trade below these balances) ─────────────────────────
min_usdc_reserve = 300.0             # Keep ≥ $300 USDC at all times
min_sol_reserve  = 2.0               # Keep ≥ 2 SOL at all times

# ─── Dynamic Grid ────────────────────────────────────────────────────────
enable_dynamic_grid  = true
volatility_window    = 100           # Rolling window (cycles) for vol calc

# Anchor-drift reposition threshold.
# Lower = more repositions (responsive), Higher = fewer (stable, cheaper).
# Production: 0.30 | Master baseline: 0.50
reposition_threshold = 0.5

# ─── Auto-Rebalancing ────────────────────────────────────────────────────
enable_auto_rebalance    = true
enable_smart_rebalance   = true
rebalance_threshold_pct  = 5.0
# Cooldown guide: 30s (scalper) | 60s (standard) | 120s (conservative)
rebalance_cooldown_secs  = 60

# ─── Order Management ────────────────────────────────────────────────────
max_orders_per_side          = 10    # See grid_levels/2 note above
order_refresh_interval_secs  = 300
enable_market_orders         = false # Limit orders only (safer, cheaper)
enable_fee_optimization      = true  # Prefer maker fills to reduce fees

# ─── Order Lifecycle ─────────────────────────────────────────────────────
# Lifecycle tuning guide:
#   Scalper:      max_age=5min,  refresh=3min,  min_orders=12
#   Production:   max_age=5min,  refresh=2min,  min_orders=8
#   Conservative: max_age=15min, refresh=8min,  min_orders=8
enable_order_lifecycle         = true
order_max_age_minutes          = 10
order_refresh_interval_minutes = 5
min_orders_to_maintain         = 8
# 🔮 Future: refresh_price_deviation = 0.5
#    Trigger an order refresh when price drifts 0.5% from last-placed anchor,
#    in addition to the existing time-based (order_max_age_minutes) trigger.
#    More responsive than time-only — catches fast moves before orders go stale.
#    Requires: new f64 field in TradingConfig + check in order_lifecycle module.
#    Reference: multi-v5-ai.toml [order_lifecycle] section (archived Feb 2026)

# ─── Risk Limits ───────────────────────────────────────────────────────
min_profit_threshold_pct = 0.1       # Skip orders below 0.1% net profit
max_slippage_pct         = 1.0       # Reject fills with >1% slippage

# ─── Price Bounds (Optional Safety Rails) ────────────────────────────────
enable_price_bounds = false          # Set true + tweak bounds for production
lower_price_bound   = 100.0
upper_price_bound   = 300.0

# ─── 🔥 Regime Gate ────────────────────────────────────────────────────
# Guards against trading in ultra-flat or extreme-volatility markets.
#
# ⚠️  UNIT SYSTEM: volatility() returns TRUE PERCENTAGE.
#   Real SOL markets: ~0.001% – 0.015% per 100-cycle window.
#   Paper/testing floor: 0.0 (always trade — disable gate)
#   Production floor:    0.02% (filters only true dead-flat markets)
#   Production ceiling:  8.0%  (pause in extreme events — from multi-v5-ai research)
#
# Scalper exception: min_volatility_to_trade=0.01, pause_in_very_low_vol=false
# (scalpers WANT quiet markets — only pause for HIGH volatility via ceiling)
#
enable_regime_gate       = false     # 🔥 DISABLED for master/testing — enable in production
min_volatility_to_trade  = 0.0       # 0.0 = no minimum (any vol trades)
# 🆕 V5.4.1: HIGH threshold — pause if volatility exceeds this %
# Extracted from multi-v5-ai research (was missing from master)
# ⚠️ PR #76: Ghost field — not yet in TradingConfig. Wire in PR #77.
# max_volatility_to_trade  = 8.0       # 8% ceiling — extreme market protection
pause_in_very_low_vol    = false     # Set true in production
# 🔮 Future: Per-regime fee tolerances (from multi-v5-ai [fee_filtering], archived Feb 2026)
#    Classify market into 4 regimes and apply different max-fee caps per regime.
#    This beats a single global fee cap — you pay up in trends, stay tight in chop.
#
#    trending_max_fee  = 0.20  # pay up to 0.20% in trending markets (worth it)
#    ranging_max_fee   = 0.12  # pay up to 0.12% in sideways/ranging markets
#    volatile_max_fee  = 0.25  # pay up to 0.25% if allow_volatile=true
#    choppy_max_fee    = 0.10  # pay max 0.10% in choppy/low-vol (tight filter)
#
#    Requires: RegimeClassifier enum (Trending|Ranging|Volatile|Choppy)
#              + FeeFilterConfig struct in config/src
#              + fee check gating each order in execution pipeline
#    See: config/rd/multi-strategy-profile.toml ## 🔮 Future Upgrade Patterns

# ─── Advanced / Future Features ──────────────────────────────────────────
enable_adaptive_spacing      = false # Stage 4: ATR-driven dynamic spacing
# 🔮 Future: volatility_multiplier = 1.5
#    When enable_adaptive_spacing=true, widen grid spacing by this factor
#    during high-volatility regimes (prevents immediate re-crossing fills).
#    volatility_lookback = 24   # lookback window in hours for multiplier calc
#    Requires: new fields in TradingConfig, ATR multiplier logic in spacing module
#    Reference: multi-v5-ai.toml [grid] section (archived Feb 2026)

# ─── 🆕 V5.6.0 (PR #94 Commits 5a+5b): Consensus Signal Position Sizing ──
#
# enable_smart_position_sizing: master on/off switch.
#   false (default) → order size is always base min_order_size (safe, zero change)
#   true            → order size scales with consensus signal conviction
#
# signal_size_multiplier: controls the peak sizing multiplier at full conviction.
#   Formula (in place_grid_orders):
#     multiplier   = 1.0 + signal_strength × (signal_size_multiplier - 1.0)
#     effective_sz = (base_size × multiplier).clamp(min_order_size, max_position_size)
#
#   signal_strength values per signal type:
#     Hold                       → 0.0  (no change regardless of multiplier)
#     Buy / Sell                 → 0.25–0.5
#     StrongBuy / StrongSell     → 0.5–1.0
#
#   Peak sizing table (at StrongBuy/Sell with confidence=1.0, strength=1.0):
#   ┌──────────────────────────┬──────────────────────────────────────────┐
#   │ signal_size_multiplier   │ Peak effective size (× base)             │
#   ├──────────────────────────┼──────────────────────────────────────────┤
#   │ 1.0 (default)            │ 1.0× — flat, consensus has zero effect   │
#   │ 1.5                      │ 1.5× at peak conviction                  │
#   │ 2.0                      │ 2.0× at peak conviction (aggressive)     │
#   │ 3.0 (max)                │ 3.0× at peak conviction (very aggressive)│
#   └──────────────────────────┴──────────────────────────────────────────┘
#
#   Validation (config/mod.rs): signal_size_multiplier must be in [0.5, 3.0]
#   when enable_smart_position_sizing = true. Out-of-range → startup bail.
#
#   Recommended first step: set multiplier=1.5, run 30min paper test,
#   check GridBotStats.last_signal_strength + fee_filter_total_passed.
#
enable_smart_position_sizing = false # Default: off — safe opt-in
signal_size_multiplier       = 1.0  # Range [0.5, 3.0] | 1.0 = flat (no effect)

# ─── 🆕 V5.6.0 (PR #94 OPT-1 / Commits 1+2): Adaptive Optimizer Cadence ─
#
# How many price-update cycles elapse between AdaptiveOptimizer ticks.
# The optimizer re-evaluates grid spacing + order size based on recent
# performance (win-rate, fill-rate, volatility trend).
#
# Tuning guide:
#   10–20  cycles → very reactive (good for volatile markets; higher CPU)
#   50     cycles → balanced baseline (default)
#   100    cycles → conservative (stable markets, fewer adjustments)
#   200+   cycles → near-static (only for highly stable overnight grids)
#
# At 100ms cycle_interval_ms:
#   50 cycles  ≈ every  5 seconds
#   100 cycles ≈ every 10 seconds
#   200 cycles ≈ every 20 seconds
#
# Replaces the old hardcoded `const OPTIMIZATION_INTERVAL_CYCLES = 50`.
# All 46 existing TOMLs without this key default to 50 (zero behaviour change).
#
optimizer_interval_cycles = 50      # Default: 50 | Must be > 0

# ═══════════════════════════════════════════════════════════════════════════
#  🔥 FEE FILTER — Per-Level Fee Profitability Gate  (PR #94 Commits 3+4)
#
#  Controls which grid levels are placed based on their projected fee cost.
#  Each candidate order is evaluated before placement:
#    P&L estimate  = expected_spread - (maker_fee + taker_fee + slippage + impact)
#  Levels whose estimated fee (BPS) falls outside [min, max] are skipped.
#
#  Why this matters:
#    Too cheap (< min_fee_threshold_bps) → stale quote or bad Jupiter route
#    Too expensive (> max_fee_threshold_bps) → fee eats entire spread → skip
#
#  Tuning guide:
#   Profile         min_bps   max_bps   window_secs   Notes
#   ─────────────   ───────   ───────   ───────────   ──────────────────────────
#   Conservative       8        50          30         Master default (balanced)
#   Scalper           12        35          15         Tighter — only high quality
#   Mainnet live       5        60          30         Wider — live spreads vary
#   Research/R&D       1       100          60         Permissive — explore all
#
#  Zero breaking change: omitting this entire section → all defaults apply.
#  enable_smart_fee_filter = false → all levels placed regardless of fee cost.
# ═══════════════════════════════════════════════════════════════════════════
[trading.fee_filter]

# Master on/off switch for the SmartFeeFilter.
# When false, ALL grid levels are placed regardless of projected fee cost.
# The [fees] enable_smart_filter flag is the global gate; this is the
# per-parameter fine-tuning layer on top of it.
enable_smart_fee_filter = true

# Minimum acceptable fee in basis points (BPS = 0.01%).
# Levels with estimated fee BELOW this are suspiciously cheap:
#   → likely a stale Jupiter quote or a route with no real liquidity.
# Default: 8 BPS (0.08%).
min_fee_threshold_bps = 8

# Maximum acceptable fee in basis points (BPS = 0.01%).
# Levels with estimated fee ABOVE this consume the entire spread:
#   → the trade is unprofitable after fees and is skipped.
# Default: 50 BPS (0.50%).
# ⚠️ Values > 500 BPS (5%) generate a startup warning in FeeFilterConfig::validate()
max_fee_threshold_bps = 50

# Rolling window (seconds) for computing the moving-average fee baseline.
# Shorter window = more reactive to recent fee spikes.
# Longer window = smoother, less sensitive to transient anomalies.
# Default: 30s | Min recommended: 5s (below this → startup warning)
# ⚠️ Values < 5s generate a startup warning in FeeFilterConfig::validate()
fee_filter_window_secs = 30

# ═══════════════════════════════════════════════════════════════════════════
#  🎯 STRATEGIES
#  consensus_mode options: "single" | "weighted" | "majority" | "unanimous"
#  active: list the strategies that should be instantiated (others are ignored)
#
#  To activate full multi-strategy (see config/rd/multi-strategy-profile.toml):
#    active = ["grid", "momentum", "rsi", "momentum_macd"]
#    consensus_mode = "weighted"
#
#  Indicator canonical defaults (from multi-v5-ai research, Feb 2026):
#    ATR:  period=14, multiplier=2.0
#    RSI:  period=14, oversold=30, overbought=70
#    BB:   period=20, std_dev=2.0
#    MACD: fast=12, slow=26, signal=9  (min_warmup_periods must be ≥26)
# ═══════════════════════════════════════════════════════════════════════════
[strategies]
active         = ["grid"]            # Add "momentum", "rsi", "momentum_macd" for multi
consensus_mode = "single"            # single = grid is sole decision maker

enable_multi_timeframe       = false
require_timeframe_alignment  = false

# ─── Strategy 1: Grid (Primary — always on) ────────────────────────────
[strategies.grid]
enabled        = true
weight         = 1.0
min_confidence = 0.5

# ── 🆕 V5.6.1 (PR #106): Seed Bypass — fixes Orders=0 on devnet / low-vol ──
#
# When true (default), the SmartFeeFilter is bypassed for the initial grid
# seeding batch. GridBot calls mark_seeding_complete() after place_grid_orders()
# returns, at which point the filter is enforced for ALL subsequent orders.
#
# Why this is needed:
#   SmartFeeFilterConfig::from_fees_config() hardcodes grace_period_trades=0.
#   In low-vol environments (devnet, ranging mainnet), the VERY_LOW_VOL
#   regime_factor (1.5×) multiplies the minimum-profit bar high enough to
#   block every seed order → 17 checked, 17 blocked, Orders=0 forever.
#
# Capital safety: bypass is time-bounded to seeding only. All live fills
# go through the full fee filter (Bug B also fixed: record_execution() now
# wired in on_fill() so trades_executed advances correctly).
#
# Set false only for hot-restart where the grid was seeded externally.
#
# Default: true
seed_orders_bypass = true

# ─── Strategy 2: Momentum ───────────────────────────────────────────────
[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

# ─── Strategy 3: Mean Reversion ─────────────────────────────────────────
[strategies.mean_reversion]
enabled            = false
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20
std_dev_multiplier = 2.0             # BB width — 2.0 = standard (from multi-v5-ai)
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

# ─── Strategy 4: RSI ────────────────────────────────────────────────────
# Canonical defaults from multi-v5-ai research (never deviate without testing)
[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14            # Canonical RSI period
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold     = 20.0
extreme_overbought   = 80.0

# ─── Strategy 5: Momentum MACD ──────────────────────────────────────────
# Canonical MACD defaults: fast=12, slow=26, signal=9
# min_warmup_periods MUST be ≥26 (slow EMA period) — never reduce below 26
[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26

# ═══════════════════════════════════════════════════════════════════════════
#  🚨 RISK MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════
[risk]
# Risk profile guide:
#   Scalper:     max_position=20%, drawdown=5%, stop=2%, tp=1%,  cb=3%, cooldown=180s
#   Production:  max_position=30%, drawdown=5%, stop=3%, tp=8%,  cb=4%, cooldown=300s
#   Conservative:max_position=25%, drawdown=5%, stop=3%, tp=8%,  cb=5%, cooldown=300s
max_position_size_pct         = 30.0
max_drawdown_pct              = 10.0
stop_loss_pct                 = 5.0
take_profit_pct               = 10.0
enable_circuit_breaker        = true
circuit_breaker_threshold_pct = 8.0
circuit_breaker_cooldown_secs = 300
# 🆕 PR #79: Max consecutive losing trades before circuit breaker trips.
# Complements drawdown-based tripping — catches slow-bleed scenarios.
max_consecutive_losses = 5

# ✅ PR #89: Trailing stop mode — controls StopLossManager behaviour.
#
# | enable_trailing_stop | Behaviour                                          |
# |----------------------|----------------------------------------------------|
# | false (default)      | Fixed stop — fires when price drops stop_loss_pct% |
# |                      | below entry_price. Reference never moves.          |
# | true                 | Trailing stop — reference ratchets up with the     |
# |                      | highest price seen since position open.            |
# |                      | Locks in gains; fires when price reverses          |
# |                      | stop_loss_pct% from the peak.                      |
#
# Trailing stop is aggressive — enable in trending markets only.
# Default false = fixed stop (safe for ranging/sideways SOL/USDC grids).
enable_trailing_stop = false

# ═══════════════════════════════════════════════════════════════════════════
#  💰 FEE CONFIGURATION — Single Source of Truth (V1.0)
#
#  All values in basis points (1 bps = 0.01%).
#  These replace hardcoded fees scattered across 4 files:
#    engine.rs (2.0/4.0 bps), paper_trader.rs (0.0002/0.0004 fraction),
#    fee_filter.rs (0.02/0.04 percent), grid_rebalancer.rs (regime spreads)
#
#  Round-trip cost with defaults: 2 + 4 + 2×5 = 16 bps (0.16%)
#  Min profitable spread: 16 bps × 2.0 multiplier = 0.32%
#
#  To tune per-pair: copy this section into your pair-specific TOML.
#  Omitting [fees] entirely → all defaults apply (zero breaking change).
# ═══════════════════════════════════════════════════════════════════════════
[fees]
maker_fee_bps = 2.0                  # 0.02% — standard Solana DEX maker fee
taker_fee_bps = 4.0                  # 0.04% — standard Solana DEX taker fee
slippage_bps  = 5.0                  # 0.05% — expected execution slippage
min_profit_multiplier = 2.0          # require 2× round-trip costs to trade
enable_smart_filter = false          # opt-in: SmartFeeFilter trade gating
market_impact_coefficient = 0.01     # 1% impact per SOL (conservative)

# ═══════════════════════════════════════════════════════════════════════════
#  📡 PYTH PRICE FEED
# ═══════════════════════════════════════════════════════════════════════════
[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
# Poll interval guide: 500ms (standard 2Hz) | 100ms (scalper 10Hz)
update_interval_ms = 500

# 🔮 Future hook — WebSocket streaming (Stage 4)
