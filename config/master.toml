# ═══════════════════════════════════════════════════════════════════════════════
#  🏆 MASTER V5.1 — GRIDZBOTZ — STAGE 3 / OPTION B READY
#
#  ✅ execution_mode:         flip "paper" → "live" to go live on-chain
#  ✅ instance_id:            unique label for multi-bot log/metrics
#  ✅ [execution]:            all Jupiter/RPC live trading knobs in TOML
#  ✅ reposition_threshold_pct: Option B — GridRebalancer level-crossing tuning
#  ✅ All silent defaults now explicit — 100% visible, zero hidden magic
#  ✅ Future hooks documented — WebSocket, Telegram, WS URL all stubbed
#
#  Run modes:
#    cargo run                                        → paper, master config
#    cargo run -- --config config/master.toml         → explicit
#    cargo run -- --config config/overnight_aggressive.toml
#    cargo run -- --mode live                         → live (Step 5)
#
#  Multi-bot example:
#    cargo run -- --config config/optimized/conservative-v4.1.toml &
#    cargo run -- --config config/optimized/multi-v5-ai.toml &
# ═══════════════════════════════════════════════════════════════════════════════

test_name = "Master V5.1 - Stage 3 Option B Ready"

# ═══════════════════════════════════════════════════════════════════════════════
#  🤖 BOT CORE
# ═══════════════════════════════════════════════════════════════════════════════
[bot]
name    = "GridzBot-Master"
version = "5.1.0"
environment = "testing"              # testing | development | production

# 🔑 EXECUTION MODE — The single most important knob:
#   "paper" → PaperTradingEngine (simulation, no real funds at risk)
#   "live"  → RealTradingEngine  (real Jupiter swaps, real SOL)
# Change to "live" + environment = "production" when ready to go on-chain.
execution_mode = "paper"

# Unique instance name — appears in all logs, CSV fills, and metrics.
# Change this when running multiple bots simultaneously so you can tell them apart.
# e.g., "live-aggressive", "paper-shadow", "conservative-1"
instance_id = "master-paper-1"

# ═══════════════════════════════════════════════════════════════════════════════
#  🌐 NETWORK
# ═══════════════════════════════════════════════════════════════════════════════
[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"             # processed | confirmed | finalized

# 🔮 Future hook — WebSocket subscription (lower latency price feed)
# Uncomment when WebSocket price feed is implemented (Stage 4+)
# ws_url = "wss://api.devnet.solana.com"

# For mainnet live trading, use:
# cluster    = "mainnet-beta"
# rpc_url    = "${CHAINSTACK_RPC_URL}"   # injected from .env at runtime
# ws_url     = "${CHAINSTACK_WS_URL}"

# ═══════════════════════════════════════════════════════════════════════════════
#  ⚡ EXECUTION (Live Trading Knobs)
#  Only enforced when execution_mode = "live"
#  Safe to leave in any config — parsed but ignored in paper mode
# ═══════════════════════════════════════════════════════════════════════════════
[execution]
# Hard cap per single Jupiter swap (SOL).
# Guards against runaway position-sizing bugs — no single trade exceeds this.
max_trade_sol = 0.5

# Priority fee in microlamports added to every transaction.
# 50_000 µlamports ≈ 0.00005 SOL per tx at current Solana base fee.
# Increase during high network congestion (check solanabeach.io).
priority_fee_microlamports = 50000

# Max acceptable slippage in BPS (basis points). 100 BPS = 1.0%.
# Jupiter rejects quotes that exceed this threshold.
# SOL/USDC is highly liquid — 50–150 BPS is typical and safe.
max_slippage_bps = 100

# Jito MEV protection tip (lamports) — protects against sandwich attacks.
# Uncomment to enable. ~0.00001 SOL per trade, worth it on mainnet.
# jito_tip_lamports = 10000

# RPC fallback URLs — tried in order if the primary RPC fails.
# Uncomment and add your backup endpoints.
# rpc_fallback_urls = ["https://api.mainnet-beta.solana.com"]

# How long to wait for on-chain confirmation before treating tx as failed.
confirmation_timeout_secs = 60

# Retry attempts per failed transaction (uses exponential backoff).
max_retries = 3

# ═══════════════════════════════════════════════════════════════════════════════
#  💰 PAPER TRADING
# ═══════════════════════════════════════════════════════════════════════════════
[paper_trading]
initial_usdc = 5000.0
initial_sol  = 10.0

# Duration — choose ONE method (others are ignored):
# Method 1: Hours  (simplest)
test_duration_hours = 1
# Method 2: Minutes (more flexible)  → uncomment to use
# test_duration_minutes = 30
# Method 3: Seconds (precise)        → uncomment to use
# test_duration_seconds = 300
# Method 4: Exact cycle count        → uncomment to use (expert mode)
# test_cycles = 3000

# ═══════════════════════════════════════════════════════════════════════════════
#  📊 TRADING — Core Grid + Behaviour Knobs
# ═══════════════════════════════════════════════════════════════════════════════
[trading]

# ─── Core Grid ───────────────────────────────────────────────────────────────
grid_levels          = 35            # 🏆 Battle-royale champion level count
grid_spacing_percent = 0.15          # 🏆 0.15% spacing — giga winner
min_order_size       = 0.1           # Minimum order size in SOL
max_position_size    = 100.0         # Hard cap on total position (SOL)

# ─── Reserves (Never trade below these balances) ─────────────────────────────
min_usdc_reserve = 300.0             # Keep ≥ $300 USDC at all times
min_sol_reserve  = 2.0               # Keep ≥ 2 SOL at all times

# ─── Dynamic Grid ────────────────────────────────────────────────────────────
enable_dynamic_grid  = true          # Adjust spacing based on ATR/volatility
volatility_window    = 100           # Rolling window (cycles) for vol calc

# Anchor-drift reposition threshold.
# GridRebalancer fires a full grid reposition when price drifts this % from anchor.
# Distinct from level-crossing (Option B): this is the "move the whole grid" trigger.
# Lower = more repositions (responsive but expensive), Higher = fewer (stable but stale)
reposition_threshold = 0.5           # 0.5% anchor drift → full reposition

# ─── Auto-Rebalancing ────────────────────────────────────────────────────────
enable_auto_rebalance    = true      # Rebalance SOL/USDC portfolio when skewed
enable_smart_rebalance   = true      # ML-enhanced rebalancing decisions
rebalance_threshold_pct  = 5.0       # Trigger rebalance if portfolio drifts >5%
rebalance_cooldown_secs  = 60        # Min seconds between rebalance operations

# ─── Order Management ────────────────────────────────────────────────────────
max_orders_per_side          = 10    # Max open buy orders OR sell orders at once
order_refresh_interval_secs  = 300   # Stale order refresh (seconds)
enable_market_orders         = false # Limit orders only (safer, cheaper)
enable_fee_optimization      = true  # Prefer maker fills to reduce fees

# ─── Order Lifecycle ─────────────────────────────────────────────────────────
# Ensures stale orders are cancelled and replaced — prevents zombie orders
enable_order_lifecycle         = true
order_max_age_minutes          = 10   # Cancel orders older than 10 min
order_refresh_interval_minutes = 5    # Check lifecycle every 5 min
min_orders_to_maintain         = 8    # Always keep ≥8 active orders per side

# ─── Risk Limits ─────────────────────────────────────────────────────────────
min_profit_threshold_pct = 0.1       # Skip orders below 0.1% net profit
max_slippage_pct         = 1.0       # Reject fills with >1% slippage

# ─── Price Bounds (Optional Safety Rails) ────────────────────────────────────
# Prevents the bot from placing orders outside a sane price range.
# Useful on mainnet to guard against flash crashes / oracle manipulation.
enable_price_bounds = false          # Set true + tweak bounds for production
lower_price_bound   = 100.0          # USD — adjust to current SOL range
upper_price_bound   = 300.0          # USD — adjust to current SOL range

# ─── 🔥 Regime Gate ──────────────────────────────────────────────────────────
# Guards against trading in ultra-flat / zero-volatility markets.
# IMPORTANT: disabled here for paper/testing. Enable for production.
#
# ⚠️  UNIT SYSTEM (V3.9+): volatility() returns TRUE PERCENTAGE.
#   Real SOL markets: ~0.001% – 0.010% per 100-cycle window.
#   Safe production floor: 0.02% (filters only true dead-flat markets).
#   DO NOT use raw-ratio values (e.g. 0.0002) — they belong to the old world.
#
#   enable_regime_gate = false  → always trade (demos, paper runs)
#   enable_regime_gate = true   → respect min_volatility_to_trade
#   min_volatility_to_trade     → 0.02 (= 0.02% true) is safe for real SOL markets
#   pause_in_very_low_vol       → set true in production for extra safety
enable_regime_gate       = false     # 🔥 DISABLED for paper/testing
min_volatility_to_trade  = 0.0       # 0.0 = no minimum (any vol trades)
pause_in_very_low_vol    = false     # Never pause (set true in production)

# ─── Advanced / Future Features ──────────────────────────────────────────────
# Off by default — flip on when Stage 4 AI features are enabled
enable_adaptive_spacing      = false # Stage 4: ATR-driven dynamic spacing
enable_smart_position_sizing = false # Stage 4: Confidence-based order sizing

# ═══════════════════════════════════════════════════════════════════════════════
#  🎯 STRATEGIES
#  consensus_mode options: "single" | "weighted" | "majority" | "unanimous"
#  active: list the strategies that should be instantiated (others are ignored)
# ═══════════════════════════════════════════════════════════════════════════════
[strategies]
active         = ["grid"]            # 🎯 Grid only for now — add "momentum", "rsi" for multi
consensus_mode = "single"            # single = grid is sole decision maker

# Future multi-timeframe alignment (Stage 4+)
enable_multi_timeframe       = false # Require signal agreement across timeframes
require_timeframe_alignment  = false # Stricter: ALL timeframes must agree

# ─── Strategy 1: Grid (Primary — always on) ──────────────────────────────────
[strategies.grid]
enabled        = true
weight         = 1.0                 # Highest weight — grid is the core strategy
min_confidence = 0.5                 # Confidence threshold to act on signal

# 🆕 Option B — GridRebalancer level-crossing tuning
# How far price must drift from the grid anchor (%) before a full reposition fires.
# This is the STRATEGY-LEVEL knob — distinct from trading.reposition_threshold
# (which is the engine-level guard). Set both consistently.
# Lower = grid repositions more aggressively, Higher = grid stays put longer.
reposition_threshold_pct = 0.50      # 0.5% anchor drift → full grid reposition

# ─── Strategy 2: Momentum (Stub — ready for Stage 4) ────────────────────────
[strategies.momentum]
enabled         = false              # Enable when Phase 3 momentum impl lands
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20                 # Bars to look back for momentum signal
threshold       = 0.02               # 2% move required to trigger signal

# ─── Strategy 3: Mean Reversion (Stub — ready for Stage 4) ──────────────────
[strategies.mean_reversion]
enabled            = false           # Enable when Phase 3 MR impl lands
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20              # SMA lookback period
std_dev_multiplier = 2.0             # Bollinger band width (2.0 = standard)

# ─── Strategy 4: RSI (Stub — ready for Stage 4) ──────────────────────────────
[strategies.rsi]
enabled              = false         # Enable when Phase 3 RSI impl lands
weight               = 0.9
min_confidence       = 0.7
period               = 14            # Standard RSI period
oversold_threshold   = 30.0          # RSI < 30 → oversold → buy signal
overbought_threshold = 70.0          # RSI > 70 → overbought → sell signal

# ═══════════════════════════════════════════════════════════════════════════════
#  🚨 RISK MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════════
[risk]
max_position_size_pct         = 30.0  # Max portfolio % in any single position
max_drawdown_pct              = 10.0  # Halt bot if drawdown exceeds 10%
stop_loss_pct                 = 5.0   # Hard stop-loss per position
take_profit_pct               = 10.0  # Hard take-profit per position
enable_circuit_breaker        = true  # Kill-switch on rapid loss
circuit_breaker_threshold_pct = 8.0   # Trip breaker at 8% loss burst
circuit_breaker_cooldown_secs = 300   # 5-min cooldown before re-enabling

# ═══════════════════════════════════════════════════════════════════════════════
#  📡 PYTH PRICE FEED
# ═══════════════════════════════════════════════════════════════════════════════
[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500             # Poll interval ms (500 = 2Hz, 100 = 10Hz)

# 🔮 Future hook — WebSocket streaming (lower latency than HTTP polling)
# Uncomment + implement when Stage 4 WS feed lands
# enable_websocket      = false
# websocket_endpoint    = "wss://hermes.pyth.network/ws"

# ═══════════════════════════════════════════════════════════════════════════════
#  ⚙️  PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════════
[performance]
cycle_interval_ms  = 100             # Main loop tick rate — 100ms = 10Hz
startup_delay_ms   = 1000            # Wait 1s at startup for feeds to stabilise
request_timeout_ms = 5000            # HTTP request timeout (Pyth, Jupiter)

# ═══════════════════════════════════════════════════════════════════════════════
#  📋 LOGGING
# ═══════════════════════════════════════════════════════════════════════════════
[logging]
level              = "info"           # trace | debug | info | warn | error
file_path          = "logs/master_v5.1.log"
enable_file_logging = true

# ═══════════════════════════════════════════════════════════════════════════════
#  📈 METRICS
# ═══════════════════════════════════════════════════════════════════════════════
[metrics]
enable_metrics = true
stats_interval = 600                 # 🆕 Print stats every 600 cycles (~60 seconds)

# ═══════════════════════════════════════════════════════════════════════════════
#  🗄️  DATABASE (Optional — disabled for paper/testing)
# ═══════════════════════════════════════════════════════════════════════════════
[database]
enabled = false
# url = "postgres://user:pass@localhost/gridzbotz"  # Uncomment for persistence

# ═══════════════════════════════════════════════════════════════════════════════
#  🔔 ALERTS (Optional — disabled for paper/testing)
#  Telegram bot alerts for fills, circuit breaker trips, and daily P&L
# ═══════════════════════════════════════════════════════════════════════════════
[alerts]
enabled = false
# telegram_bot_token = "${TELEGRAM_BOT_TOKEN}"   # Set via .env
# telegram_chat_id   = "${TELEGRAM_CHAT_ID}"     # Your chat or group ID
