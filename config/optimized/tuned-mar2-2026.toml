# ═══════════════════════════════════════════════════════════════════════════
#  🎯 TUNED V5.3 — MARCH 2, 2026 MARKET CONDITIONS
#
#  Calibrated from 3000-cycle paper trading run (305.99s)
#  Problem: 0 fills despite 3000 cycles (grid 2.1x too wide)
#  Solution: Tighten spacing 0.15% → 0.12%, enable regime gate, adaptive spacing
#
#  📊 Observed Market Behavior (Last 5min):
#     Price Range:    $87.39 → $87.60 (0.24% movement)
#     Volatility:     0.0008% (min) → 0.0154% (max), avg 0.008%
#     Grid Spacing:   0.50% (current) — TOO WIDE
#
#  🔧 Tuning Strategy:
#     Phase 1: Tighter grid (0.12% spacing, 20 levels)
#     Phase 2: Regime gate enabled (pause <0.02% vol)
#     Phase 3: Adaptive spacing via ATR
#     Phase 4: Conservative security limits
#     Phase 5: Aggressive order lifecycle refresh
#
#  📈 Expected Improvement:
#     Fills:          0 → 8-15 per 3000 cycles
#     Repos:          0 → 2-4
#     Grid Efficiency: 0% → 40-60%
#     Regime Pauses:  10-20% of runtime
#
#  Run: cargo run -- --config config/optimized/tuned-mar2-2026.toml
#
# ═══════════════════════════════════════════════════════════════════════════

test_name = "Tuned V5.3 - March 2, 2026 Market"

# ═══════════════════════════════════════════════════════════════════════════
#  🤖 BOT CORE
# ═══════════════════════════════════════════════════════════════════════════
[bot]
name    = "GridzBot-Tuned-Mar2"
version = "5.3.0"
environment = "testing"              # testing for validation, then → production

execution_mode = "paper"             # Validate in paper first
instance_id = "tuned-mar2-paper-1"   # Unique ID for metrics tracking

# ═══════════════════════════════════════════════════════════════════════════
#  🌐 NETWORK
# ═══════════════════════════════════════════════════════════════════════════
[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"

# ═══════════════════════════════════════════════════════════════════════════
#  🔐 SECURITY — Conservative Live Limits (Phase 4)
# ═══════════════════════════════════════════════════════════════════════════
[security]
wallet_path = "~/.config/solana/id.json"
require_password = false

# 🎯 TUNED: Conservative limits for first live test
max_trade_size_usdc = 50.0           # ↓ from 250 (safer start)
max_transaction_amount_usdc = 50.0
max_daily_trades = 50                # ↓ from 100
max_daily_volume_usdc = 200.0        # ↓ from 500 ($200/day cap)

# ═══════════════════════════════════════════════════════════════════════════
#  ⚡ EXECUTION
# ═══════════════════════════════════════════════════════════════════════════
[execution]
max_trade_sol = 0.5
priority_fee_microlamports = 50000
max_slippage_bps = 100
confirmation_timeout_secs = 60
max_retries = 3

# ═══════════════════════════════════════════════════════════════════════════
#  💰 PAPER TRADING
# ═══════════════════════════════════════════════════════════════════════════
[paper_trading]
initial_usdc = 5000.0
initial_sol  = 10.0
test_duration_hours = 1              # 1-hour validation run

# ═══════════════════════════════════════════════════════════════════════════
#  📊 TRADING — TUNED FOR 0.24% PRICE RANGE (Phase 1)
# ═══════════════════════════════════════════════════════════════════════════
[trading]

# ─── Core Grid (Tightened) ─────────────────────────────────────────────────
grid_levels          = 20            # 🎯 ↓ from 35 (focus capital on active zone)
grid_spacing_percent = 0.12          # 🎯 ↓ from 0.15% (match 0.24% observed range)
min_order_size       = 0.1
max_position_size    = 100.0

# ─── Reserves ──────────────────────────────────────────────────────────────
min_usdc_reserve = 300.0
min_sol_reserve  = 2.0

# ─── Dynamic Grid + Adaptive Spacing (Phase 3) ─────────────────────────────
enable_dynamic_grid  = true          # ✅ Keep enabled
volatility_window    = 100

# 🆕 ENABLED: ATR-driven dynamic spacing (was false in master.toml)
enable_adaptive_spacing = true       # 🎯 Widens at 0.015% vol, tightens at 0.0008%

# 🎯 TUNED: More responsive reposition threshold
reposition_threshold = 0.30          # ↓ from 0.50% (fires at 0.3% anchor drift)

# ─── Auto-Rebalancing ──────────────────────────────────────────────────────
enable_auto_rebalance    = true
enable_smart_rebalance   = true
rebalance_threshold_pct  = 5.0
rebalance_cooldown_secs  = 60

# ─── Order Management ──────────────────────────────────────────────────────
max_orders_per_side          = 10
order_refresh_interval_secs  = 300
enable_market_orders         = false
enable_fee_optimization      = true

# ─── Order Lifecycle (Phase 5 - Aggressive Refresh) ────────────────────────
enable_order_lifecycle         = true
order_max_age_minutes          = 5   # 🎯 ↓ from 10 (faster refresh)
order_refresh_interval_minutes = 2   # 🎯 ↓ from 5 (check every 2min)
min_orders_to_maintain         = 8

# ─── Risk Limits ───────────────────────────────────────────────────────────
min_profit_threshold_pct = 0.1
max_slippage_pct         = 1.0

# ─── Price Bounds ──────────────────────────────────────────────────────────
enable_price_bounds = false
lower_price_bound   = 100.0
upper_price_bound   = 300.0

# ─── 🔥 Regime Gate (Phase 2 - NOW ENABLED) ────────────────────────────────
# 🎯 CRITICAL CHANGE: Was disabled in master.toml, now ENABLED
#
# During 3000-cycle run, vol dropped to 0.0008% — bot should've paused.
# This gate blocks trading when volatility < 0.02% (filters flatlines).
#
enable_regime_gate       = true      # 🎯 ✅ ENABLED (was false)
min_volatility_to_trade  = 0.02      # 🎯 0.02% floor (observed 0.0008% lows)
pause_in_very_low_vol    = true      # 🎯 Auto-pause when vol < threshold

# ─── Advanced Features ─────────────────────────────────────────────────────
enable_smart_position_sizing = false # Stage 4 feature (off for now)

# ═══════════════════════════════════════════════════════════════════════════
#  🎯 STRATEGIES
# ═══════════════════════════════════════════════════════════════════════════
[strategies]
active         = ["grid"]
consensus_mode = "single"

enable_multi_timeframe       = false
require_timeframe_alignment  = false

# ─── Strategy 1: Grid ──────────────────────────────────────────────────────
[strategies.grid]
enabled        = true
weight         = 1.0
min_confidence = 0.5

# 🎯 TUNED: Match trading.reposition_threshold
reposition_threshold_pct = 0.30      # ↓ from 0.50%

# ─── Strategy 2-5: Disabled (Grid-only for tuning) ────────────────────────
[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

[strategies.mean_reversion]
enabled            = false
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20
std_dev_multiplier = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold   = 20.0
extreme_overbought = 80.0

[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26

# ═══════════════════════════════════════════════════════════════════════════
#  🚨 RISK MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════
[risk]
max_position_size_pct         = 30.0
max_drawdown_pct              = 10.0
stop_loss_pct                 = 5.0
take_profit_pct               = 10.0
enable_circuit_breaker        = true
circuit_breaker_threshold_pct = 8.0
circuit_breaker_cooldown_secs = 300

# ═══════════════════════════════════════════════════════════════════════════
#  📡 PYTH PRICE FEED
# ═══════════════════════════════════════════════════════════════════════════
[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500

# ═══════════════════════════════════════════════════════════════════════════
#  ⚙️  PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════
[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 1000
request_timeout_ms = 5000

# ═══════════════════════════════════════════════════════════════════════════
#  📋 LOGGING
# ═══════════════════════════════════════════════════════════════════════════
[logging]
level              = "info"
file_path          = "logs/tuned_mar2_2026.log"
enable_file_logging = true

# ═══════════════════════════════════════════════════════════════════════════
#  📈 METRICS
# ═══════════════════════════════════════════════════════════════════════════
[metrics]
enable_metrics = true
stats_interval = 600

# ═══════════════════════════════════════════════════════════════════════════
#  🗄️  DATABASE (Disabled)
# ═══════════════════════════════════════════════════════════════════════════
[database]
enabled = false

# ═══════════════════════════════════════════════════════════════════════════
#  🔔 ALERTS (Disabled)
# ═══════════════════════════════════════════════════════════════════════════
[alerts]
enabled = false
