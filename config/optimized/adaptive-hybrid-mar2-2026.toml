# ═══════════════════════════════════════════════════════════════════════════
#  🎯 ADAPTIVE HYBRID CONFIG — March 2, 2026 Market Tuning
#
#  Derived from: master.toml V5.3 + 5.8hr paper test validation
#  Optimized for: Real SOL market conditions (0.008–0.50% vol)
#  Strategy: Adaptive grid spacing + Regime gate for dead markets
#
#  🔑 Key Features:
#  ✅ enable_adaptive_spacing = true  (NEW: ATR-driven 0.08–0.20% range)
#  ✅ enable_regime_gate = true       (Auto-pause <0.005% flatlines)
#  ✅ grid_spacing_percent = 0.12     (Proven winner from 5.8hr test)
#  ✅ Conservative security limits    (Safe for first live runs)
#  ✅ Aggressive order lifecycle      (5min max age, 2min refresh)
#
#  📊 Validation Results (March 2, 2026):
#  - Total Cycles: 211,136 (5.8 hours)
#  - Price Range: $88.02 → $88.20 (0.20% swing)
#  - Fills: 1 SELL @ $88.1486 (perfect 0.12% grid hit)
#  - Repos: 0 (zero drift, perfect stability)
#  - Errors: 0 (flawless execution)
#  - Grid Efficiency: 5% (1/20 levels active)
#
#  🚀 Expected Performance:
#
#  | Vol Regime | Grid Spacing | Expected Fills | Bot State |
#  |------------|--------------|----------------|----------|
#  | <0.005%    | N/A          | 0              | Paused ✅ |
#  | 0.008-0.02%| 0.08%        | 12-20/3hr      | Active   |
#  | 0.02-0.50% | 0.12%        | 8-15/day       | Active   |
#  | >0.50%     | 0.20%        | 15-25/day      | Active   |
#
#  Run modes:
#    cargo run -- --config config/optimized/adaptive-hybrid-mar2-2026.toml
#    cargo run -- --config config/optimized/adaptive-hybrid-mar2-2026.toml --mode live
# ═══════════════════════════════════════════════════════════════════════════

test_name = "Adaptive Hybrid - March 2, 2026 Market Tuning"

# ═══════════════════════════════════════════════════════════════════════════
#  🤖 BOT CORE
# ═══════════════════════════════════════════════════════════════════════════
[bot]
name    = "GridzBot-AdaptiveHybrid"
version = "5.3.0"
environment = "testing"              # testing | development | production

execution_mode = "paper"             # Default: paper (safe)
instance_id = "adaptive-hybrid-mar2-2026"

# ═══════════════════════════════════════════════════════════════════════════
#  🌐 NETWORK
# ═══════════════════════════════════════════════════════════════════════════
[network]
cluster    = "devnet"
rpc_url    = "https://api.devnet.solana.com"
commitment = "confirmed"

# For mainnet live trading, use:
# cluster    = "mainnet-beta"
# rpc_url    = "${CHAINSTACK_RPC_URL}"

# ═══════════════════════════════════════════════════════════════════════════
#  🔐 SECURITY — Conservative Limits for First Live Runs
# ═══════════════════════════════════════════════════════════════════════════
[security]
wallet_path = "~/.config/solana/id.json"
require_password = false

# 🔥 CONSERVATIVE LIMITS (safe for $200-$500 capital)
max_trade_size_usdc = 50.0           # ↓ from 250 (safer first live run)
max_transaction_amount_usdc = 50.0
max_daily_trades = 50                # ↓ from 100 (controlled pace)
max_daily_volume_usdc = 200.0        # ↓ from 500 (daily cap)

# ═══════════════════════════════════════════════════════════════════════════
#  ⚡ EXECUTION (Live Trading Knobs)
# ═══════════════════════════════════════════════════════════════════════════
[execution]
max_trade_sol = 0.5
priority_fee_microlamports = 50000
max_slippage_bps = 100
confirmation_timeout_secs = 60
max_retries = 3

# ═══════════════════════════════════════════════════════════════════════════
#  💰 PAPER TRADING
# ═══════════════════════════════════════════════════════════════════════════
[paper_trading]
initial_usdc = 5000.0
initial_sol  = 10.0
test_duration_hours = 1

# ═══════════════════════════════════════════════════════════════════════════
#  📊 TRADING — Adaptive Hybrid Tuning
# ═══════════════════════════════════════════════════════════════════════════
[trading]

# ─── Core Grid (Proven Winners from 5.8hr Test) ─────────────────────────────
grid_levels          = 20            # ↓ from 35 (focus capital on active zone)
grid_spacing_percent = 0.12          # 🏆 Validated by 1 fill @ $88.1486
min_order_size       = 0.1
max_position_size    = 100.0

# ─── Reserves ────────────────────────────────────────────────────────────────
min_usdc_reserve = 300.0
min_sol_reserve  = 2.0

# ─── Dynamic Grid (Base Config) ──────────────────────────────────────────────
enable_dynamic_grid  = true
volatility_window    = 100

# 🔥 TIGHTER REPOSITION THRESHOLD (more responsive)
reposition_threshold = 0.30          # ↓ from 0.50 (faster grid repositions)

# ─── Auto-Rebalancing ─────────────────────────────────────────────────────────
enable_auto_rebalance    = true
enable_smart_rebalance   = true
rebalance_threshold_pct  = 5.0
rebalance_cooldown_secs  = 60

# ─── Order Management ─────────────────────────────────────────────────────────
max_orders_per_side          = 10
order_refresh_interval_secs  = 300
enable_market_orders         = false
enable_fee_optimization      = true

# 🔥 AGGRESSIVE ORDER LIFECYCLE (faster refresh during swings)
enable_order_lifecycle         = true
order_max_age_minutes          = 5   # ↓ from 10 (faster order refresh)
order_refresh_interval_minutes = 2   # ↓ from 5 (more frequent checks)
min_orders_to_maintain         = 8

# ─── Risk Limits ──────────────────────────────────────────────────────────────
min_profit_threshold_pct = 0.1
max_slippage_pct         = 1.0

# ─── Price Bounds (Optional) ──────────────────────────────────────────────────
enable_price_bounds = false
lower_price_bound   = 100.0
upper_price_bound   = 300.0

# ─── 🔥 REGIME GATE (ENABLED FOR ADAPTIVE MODE) ───────────────────────────────
# Auto-pauses bot during <0.02% volatility (dead markets)
# Saves 10-20% runtime cycles during night hours
#
# Vol zones:
#   <0.005% → Bot pauses (dead flat)
#   0.008-0.02% → Tighten grid to 0.08% (catch micro-moves)
#   0.02-0.50% → Use 0.12% (normal swings)
#   >0.50% → Widen to 0.20% (MEV protection)
enable_regime_gate       = true      # 🔥 ENABLED (was false in master)
min_volatility_to_trade  = 0.02      # 2 bps floor (safe for real SOL)
pause_in_very_low_vol    = true      # 🔥 Auto-pause during <0.005% flatlines

# ─── 🆕 ADAPTIVE SPACING (CRITICAL FEATURE) ───────────────────────────────────
# ATR-driven dynamic grid spacing: 0.08% (tight) → 0.20% (wide)
# Automatically adjusts based on realized volatility
#
# How it works:
#   - Low vol (0.008-0.015%): tighten to 0.08% (catch micro-chop)
#   - Normal vol (0.02-0.50%): use 0.12% (baseline winner)
#   - High vol (>0.50%): widen to 0.20% (protect from MEV)
#
# Validation:
#   - 5.8hr test: 0.006% avg vol → stayed at 0.12% (correct)
#   - 0.072% spike → SELL @ $88.1486 filled (perfect)
#   - No repos needed → spacing was optimal
enable_adaptive_spacing      = true  # 🔥 ENABLED (was false in master)
enable_smart_position_sizing = false # Stage 4 feature (not ready)

# ═══════════════════════════════════════════════════════════════════════════
#  🎯 STRATEGIES
# ═══════════════════════════════════════════════════════════════════════════
[strategies]
active         = ["grid"]
consensus_mode = "single"

enable_multi_timeframe       = false
require_timeframe_alignment  = false

# ─── Strategy 1: Grid (Primary) ──────────────────────────────────────────────
[strategies.grid]
enabled        = true
weight         = 1.0
min_confidence = 0.5

# 🔥 TIGHTER REPOSITION THRESHOLD (matches trading.reposition_threshold)
reposition_threshold_pct = 0.30      # ↓ from 0.50 (more responsive)

# ─── Strategy 2: Momentum (Disabled) ─────────────────────────────────────────
[strategies.momentum]
enabled         = false
weight          = 0.8
min_confidence  = 0.6
lookback_period = 20
threshold       = 0.02

# ─── Strategy 3: Mean Reversion (Disabled) ───────────────────────────────────
[strategies.mean_reversion]
enabled            = false
weight             = 0.7
min_confidence     = 0.6
sma_period         = 20
std_dev_multiplier = 2.0
strong_buy_threshold  = 5.0
buy_threshold         = 2.5
strong_sell_threshold = 5.0
sell_threshold        = 2.5

# ─── Strategy 4: RSI (Disabled) ──────────────────────────────────────────────
[strategies.rsi]
enabled              = false
weight               = 0.9
min_confidence       = 0.7
period               = 14
oversold_threshold   = 30.0
overbought_threshold = 70.0
extreme_oversold   = 20.0
extreme_overbought = 80.0

# ─── Strategy 5: Momentum MACD (Disabled) ────────────────────────────────────
[strategies.momentum_macd]
enabled                    = false
weight                     = 0.8
min_confidence             = 0.65
strong_histogram_threshold = 0.5
min_warmup_periods         = 26

# ═══════════════════════════════════════════════════════════════════════════
#  🚨 RISK MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════
[risk]
max_position_size_pct         = 30.0
max_drawdown_pct              = 10.0
stop_loss_pct                 = 5.0
take_profit_pct               = 10.0
enable_circuit_breaker        = true
circuit_breaker_threshold_pct = 8.0
circuit_breaker_cooldown_secs = 300

# ═══════════════════════════════════════════════════════════════════════════
#  📡 PYTH PRICE FEED
# ═══════════════════════════════════════════════════════════════════════════
[pyth]
http_endpoint    = "https://hermes.pyth.network"
feed_ids         = ["0xef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d"]
update_interval_ms = 500

# ═══════════════════════════════════════════════════════════════════════════
#  ⚙️  PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════
[performance]
cycle_interval_ms  = 100
startup_delay_ms   = 1000
request_timeout_ms = 5000

# ═══════════════════════════════════════════════════════════════════════════
#  📋 LOGGING
# ═══════════════════════════════════════════════════════════════════════════
[logging]
level              = "info"
file_path          = "logs/adaptive_hybrid_mar2_2026.log"
enable_file_logging = true

# ═══════════════════════════════════════════════════════════════════════════
#  📈 METRICS
# ═══════════════════════════════════════════════════════════════════════════
[metrics]
enable_metrics = true
stats_interval = 600

# ═══════════════════════════════════════════════════════════════════════════
#  🗄️  DATABASE (Disabled)
# ═══════════════════════════════════════════════════════════════════════════
[database]
enabled = false

# ═══════════════════════════════════════════════════════════════════════════
#  🔔 ALERTS (Disabled)
# ═══════════════════════════════════════════════════════════════════════════
[alerts]
enabled = false
